<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a2a">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="共用/manifest.json">
<link rel="icon" href="共用/icon-192.png?v=2">
<title>遊戲樂園</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 50% 20%, #1a1a5e 0%, #0a0a2a 70%);
    font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 40px 20px; color: #fff;
  }
  h1 { font-size: clamp(32px, 8vw, 56px); text-shadow: 0 0 30px #6688ff; margin-bottom: 30px; }
  .games { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; max-width: 900px; }
  a.card {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    width: 220px; height: 220px; border-radius: 28px; text-decoration: none; color: #fff;
    background: linear-gradient(160deg, #2a2a7e, #1a1a4e);
    border: 3px solid rgba(255,255,255,.15);
    box-shadow: 0 8px 24px rgba(0,0,0,.4);
    transition: transform .15s;
  }
  a.card:active { transform: scale(.95); }
  .card .icon { font-size: 84px; margin-bottom: 6px; }
  .card .name { font-size: 24px; font-weight: bold; }
  .card .date { font-size: 14px; color: #aab4e8; margin-top: 8px; }
  .empty { color: #8890c0; font-size: 18px; margin-top: 20px; }
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: -1; }
</style>
</head>
<body>
<h1>🎮 遊戲樂園</h1>
<div class="games" id="games"></div>
<canvas class="stars" id="stars"></canvas>
<script>
  /* ===== 遊戲清單 =====
     一週上架一款：每款填「上線日期 release」。
     開頁時用裝置「今天」比對，release 比今天晚的就先不顯示（網址仍可直接遊玩）。
     新增遊戲 = 在這裡加一行；ver 是快取版本號，更新該遊戲就 +1。 */
  const GAMES = [
    { folder: '遊戲1-火箭冒險',     icon: '🚀', name: '火箭冒險',     ver: 14, release: '2026-06-05' },
    { folder: '遊戲2-水泥車大作戰', icon: '🚛', name: '水泥車大作戰', ver: 5,  release: '2026-06-12' },
    { folder: '遊戲3-挖土機挖挖樂', icon: '🚜', name: '挖土機挖挖樂', ver: 1,  release: '2026-06-19' },
    { folder: '遊戲4-救護車嗶寶',   icon: '🚑', name: '救護車嗶寶',   ver: 5,  release: '2026-06-26' },
    { folder: '遊戲5-垃圾車來囉',   icon: '🚛', name: '垃圾車來囉',   ver: 4,  release: '2026-07-03' },
  ];

  // 今天（取本地日期、歸零時分秒）；上線日同一天就算已上線
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const fmt = s => s.replaceAll('-', '/'); // 2026-06-07 → 2026/06/07
  const box = document.getElementById('games');

  // 今天 >= 上線日才顯示（上線當天就會出現）
  const live = GAMES.filter(g => today >= new Date(g.release + 'T00:00:00'));
  for (const g of live) {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = encodeURIComponent(g.folder) + '/?v=' + g.ver;
    a.innerHTML = `<div class="icon">${g.icon}</div><div class="name">${g.name}</div>`
                + `<div class="date">📅 ${fmt(g.release)} 上線</div>`;
    box.appendChild(a);
  }
  if (!live.length) {
    const p = document.createElement('div');
    p.className = 'empty';
    p.textContent = '新遊戲即將登場，敬請期待 ✨';
    box.appendChild(p);
  }
</script>
<script>
  // 簡單的閃爍星空背景
  const c = document.getElementById('stars'), x = c.getContext('2d');
  c.width = innerWidth; c.height = innerHeight;
  const st = Array.from({length: 60}, () => ({ x: Math.random()*c.width, y: Math.random()*c.height, s: Math.random()*2+0.5, t: Math.random()*6 }));
  (function loop(now) {
    x.clearRect(0,0,c.width,c.height);
    for (const s of st) {
      x.globalAlpha = .3 + .7*Math.abs(Math.sin(now/800 + s.t));
      x.fillStyle = '#fff';
      x.beginPath(); x.arc(s.x, s.y, s.s, 0, 7); x.fill();
    }
    requestAnimationFrame(loop);
  })(0);
</script>
</body>
</html>
