<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a2a">
<title>📡 感應器模式</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: radial-gradient(ellipse at 50% 30%, #1a1a5e 0%, #0a0a2a 70%);
    font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; color: #fff;
  }
  .page {
    height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center; padding: 3vmin;
  }
  h1 { font-size: clamp(26px, 8vmin, 48px); margin-bottom: 2vmin; }
  .sub { color: #aab; font-size: clamp(14px, 3.5vmin, 20px); line-height: 1.7; margin-bottom: 3vmin; }
  #codeInput {
    width: 60vmin; max-width: 320px; padding: 2vmin; text-align: center;
    font-size: clamp(36px, 12vmin, 72px); font-weight: bold; letter-spacing: 1.5vmin;
    border: 3px solid #6688ff; border-radius: 16px; background: #11114a; color: #ffdd44;
  }
  #codeInput::placeholder { color: #444a88; }
  #btnGo {
    margin-top: 3vmin; padding: 2vmin 8vmin; font-size: clamp(20px, 6vmin, 32px); font-weight: bold;
    color: #fff; border: none; border-radius: 60px; cursor: pointer;
    background: linear-gradient(180deg, #b266ff, #7733ff); box-shadow: 0 5px 0 rgba(0,0,0,.35);
  }
  #btnGo:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,0,0,.35); }
  #btnGo:disabled { opacity: .5; }
  #status { margin-top: 3vmin; font-size: clamp(14px, 4vmin, 20px); color: #8f8; min-height: 1.5em; }

  /* 連線後畫面 */
  #live { display: none; }
  #liveTitle { font-size: clamp(24px, 7vmin, 40px); color: #8f8; margin-bottom: 1vmin; }
  #camWrap {
    position: relative; width: 70vmin; max-width: 90vw; aspect-ratio: 4/3;
    border: 3px solid rgba(255,255,255,.4); border-radius: 16px; overflow: hidden; margin: 2vmin 0;
  }
  #cam { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #dot {
    position: absolute; top: 50%; width: 16px; height: 16px; border-radius: 50%;
    background: #00ff88; box-shadow: 0 0 10px #00ff88; transform: translate(-50%,-50%);
    transition: left .08s linear;
  }
  .ind { display: flex; gap: 5vmin; font-size: clamp(16px, 4.5vmin, 24px); }
  .ind span { opacity: .35; transition: opacity .15s; }
  .ind span.on { opacity: 1; }
  #tip { margin-top: 2.5vmin; color: #aab; font-size: clamp(13px, 3.5vmin, 18px); line-height: 1.7; }
</style>
</head>
<body>

<div class="page" id="setup">
  <h1>📡 感應器模式</h1>
  <div class="sub">電視先選「📺 電視模式」<br>然後在這裡輸入電視畫面上的 4 位配對碼</div>
  <input id="codeInput" type="tel" inputmode="numeric" maxlength="4" placeholder="0000" autocomplete="off">
  <button id="btnGo">連線</button>
  <div id="status"></div>
</div>

<div class="page" id="live">
  <div id="liveTitle">✅ 已連線</div>
  <div class="sub">把手機<b>橫放在電視上方</b>，鏡頭朝向玩的人</div>
  <div id="camWrap">
    <video id="cam" playsinline muted autoplay></video>
    <div id="dot"></div>
  </div>
  <div class="ind">
    <span id="indPerson">🧍 偵測到人</span>
    <span id="indHands">🙌 舉手</span>
    <span id="indSwat">👋 拍擊</span>
  </div>
  <div id="tip">保持這個頁面開著，螢幕會自動常亮。<br>影像只在手機上運算，只傳位置數據到電視。</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="module">
const statusEl = document.getElementById('status');
const codeInput = document.getElementById('codeInput');
const btnGo = document.getElementById('btnGo');
const video = document.getElementById('cam');
const dot = document.getElementById('dot');

// 網址帶 ?c=1234 可預填配對碼
const pre = new URLSearchParams(location.search).get('c');
if (pre) codeInput.value = pre.replace(/\D/g, '').slice(0, 4);

let poseLandmarker = null, lastVideoTime = -1;
let conn = null;

// 揮手拍擊偵測（與遊戲本體相同邏輯）
let lastWrist = null, swatAt = 0;

async function setupCameraAndModel() {
  statusEl.textContent = '📷 啟動鏡頭…';
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
    audio: false,
  });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();

  statusEl.textContent = '🤖 載入 AI 模型…（第一次會久一點）';
  const { PoseLandmarker, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14');
  const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task',
      delegate: 'GPU',
    },
    runningMode: 'VIDEO',
    numPoses: 1,
  });
}

function connect(code) {
  return new Promise((resolve, reject) => {
    statusEl.textContent = '📺 連線到電視…';
    const peer = new Peer();
    const timer = setTimeout(() => reject(new Error('連線逾時，確認配對碼正確、兩台裝置都有網路')), 15000);
    peer.on('error', e => { clearTimeout(timer); reject(new Error('連線失敗（' + e.type + '）')); });
    peer.on('open', () => {
      const c = peer.connect('vbk-rocket-' + code);
      c.on('open', () => { clearTimeout(timer); resolve(c); });
      c.on('error', e => { clearTimeout(timer); reject(e); });
    });
  });
}

function trackLoop() {
  requestAnimationFrame(trackLoop);
  if (!poseLandmarker || !conn || video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;
  let result;
  try { result = poseLandmarker.detectForVideo(video, performance.now()); } catch (e) { return; }
  const lm = result.landmarks && result.landmarks[0];
  if (!lm) {
    document.getElementById('indPerson').classList.remove('on');
    return;
  }
  // 與遊戲本體相同的計算：鏡像 X、舉手、肩寬、揮手
  const personX = 1 - (lm[11].x + lm[12].x) / 2;
  const handsUp = lm[15].y < lm[0].y && lm[16].y < lm[0].y;
  const shoulderW = Math.abs(lm[11].x - lm[12].x);
  let swat = false;
  const tNow = performance.now();
  if (lastWrist && tNow - lastWrist.t < 300) {
    const dtw = (tNow - lastWrist.t) / 1000;
    const ldx = Math.abs(lm[15].x - lastWrist.lx), ldy = Math.abs(lm[15].y - lastWrist.ly);
    const rdx = Math.abs(lm[16].x - lastWrist.rx), rdy = Math.abs(lm[16].y - lastWrist.ry);
    const lSwat = Math.hypot(ldx, ldy) / dtw > 2.0 && ldx > ldy * 1.2;
    const rSwat = Math.hypot(rdx, rdy) / dtw > 2.0 && rdx > rdy * 1.2;
    if (!handsUp && (lSwat || rSwat) && tNow - swatAt > 800) {
      swatAt = tNow;
      swat = true;
    }
  }
  lastWrist = { lx: lm[15].x, ly: lm[15].y, rx: lm[16].x, ry: lm[16].y, t: tNow };

  try { conn.send({ x: personX, h: handsUp ? 1 : 0, w: shoulderW, s: swat ? 1 : 0 }); } catch (e) {}

  // 畫面指示
  dot.style.left = (personX * 100) + '%';
  dot.style.background = handsUp ? '#ffdd00' : '#00ff88';
  document.getElementById('indPerson').classList.add('on');
  document.getElementById('indHands').classList.toggle('on', handsUp);
  if (swat) {
    const el = document.getElementById('indSwat');
    el.classList.add('on');
    setTimeout(() => el.classList.remove('on'), 500);
  }
}

btnGo.addEventListener('click', async () => {
  const code = codeInput.value.trim();
  if (!/^\d{4}$/.test(code)) { statusEl.textContent = '請輸入 4 位數字配對碼'; return; }
  btnGo.disabled = true;
  try {
    try { await navigator.wakeLock.request('screen'); } catch (e) {}
    if (!poseLandmarker) await setupCameraAndModel();
    conn = await connect(code);
    conn.on('close', () => {
      document.getElementById('live').style.display = 'none';
      document.getElementById('setup').style.display = 'flex';
      statusEl.textContent = '⚠️ 連線中斷了，請再連一次';
      btnGo.disabled = false;
      conn = null;
    });
    document.getElementById('setup').style.display = 'none';
    document.getElementById('live').style.display = 'flex';
  } catch (e) {
    statusEl.textContent = '❌ ' + e.message;
    btnGo.disabled = false;
  }
});

trackLoop();
</script>
</body>
</html>
