<!DOCTYPE html>

<title>🚑 救護車嗶寶</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #7fd0ef; touch-action: none; }
  body { font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; }
  #game { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* HUD（疊在 3D 畫面上） */
  #hud { position: fixed; inset: 0; z-index: 15; pointer-events: none; display: none;
         color: #fff; text-shadow: 0 2px 6px rgba(0,40,70,.5); font-weight: bold; }
  #hudL { position: absolute; top: 2.2vmin; left: 2.4vmin; font-size: clamp(16px, 4.4vmin, 40px); letter-spacing: .5px; }
  #hudL span { margin-right: 1.4vmin; }
  #hudR { position: absolute; top: 2.4vmin; right: 2.6vmin; font-size: clamp(13px, 3.6vmin, 30px); color: #fff0c0; }
  #hudBarWrap { position: absolute; top: 1.6vmin; left: 50%; transform: translateX(-50%);
                width: min(52vw, 380px); height: clamp(16px, 3vmin, 26px);
                background: rgba(0,0,0,.28); border-radius: 999px; overflow: hidden; }
  #hudBarFill { height: 100%; width: 0%; border-radius: 999px;
                background: linear-gradient(90deg, #ff6f8a, #ffd54f); transition: width .12s linear; }
  #hudBarText { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
                font-size: clamp(11px, 2.2vmin, 18px); }
  #hudMag { position: absolute; top: 5.4vmin; left: 50%; transform: translateX(-50%);
            font-size: clamp(13px, 3vmin, 24px); color: #fff; }

  /* 鏡頭預覽小視窗 */
  #pip { position: fixed; left: 12px; bottom: 12px; width: 160px; height: 120px;
    border: 3px solid rgba(255,255,255,.6); border-radius: 12px; overflow: hidden;
    display: none; z-index: 20; background: #000; }
  #pip video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #pipDot { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
    background: #00ff88; box-shadow: 0 0 8px #00ff88; transform: translate(-50%,-50%);
    transition: left .1s linear, top .1s linear; }
  #pipHide { position: absolute; top: 2px; right: 2px; width: 28px; height: 28px;
    background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: 8px; font-size: 14px; }

  .overlay { position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff; }
  #startOverlay { background: linear-gradient(180deg, #5ec0e8 0%, #bfe6ff 45%, #9fe080 78%, #6fae3e 100%); padding: 2vmin; overflow: hidden; }
  #startOverlay h1 { font-size: clamp(22px, 9vmin, 64px); margin-bottom: 1vmin; text-shadow: 0 3px 14px rgba(0,40,80,.4); }
  #startOverlay .car-big { font-size: clamp(44px, 16vmin, 140px); line-height: 1.1; animation: drive 1.4s ease-in-out infinite; }
  @keyframes drive { 0%,100% { transform: translateX(-2vmin) rotate(-2deg) } 50% { transform: translateX(2vmin) rotate(2deg) } }
  .btn { margin: 1.2vmin; padding: 1.8vmin 5vmin; font-size: clamp(15px, 5vmin, 32px); font-weight: bold;
    color: #fff; border: none; border-radius: 60px; cursor: pointer; box-shadow: 0 0.6vmin 0 rgba(0,0,0,.35); }
  .btn:active { transform: translateY(0.4vmin); box-shadow: 0 0.2vmin 0 rgba(0,0,0,.35); }
  #btnBody  { background: linear-gradient(180deg, #ff6f8a, #e23a5e); }
  #btnTouch { background: linear-gradient(180deg, #00b8ff, #0066ff); }
  #startOverlay .hint { margin-top: 1.5vmin; font-size: clamp(10px, 3vmin, 18px); color: #fff8ec; max-width: 92%; line-height: 1.5; text-shadow: 0 1px 4px rgba(0,40,80,.5); }

  #rotateHint { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    background: rgba(0,0,0,.7); color: #ffdd44; text-align: center;
    font-size: clamp(14px, 4vmin, 22px); font-weight: bold; padding: 2vmin; pointer-events: none; }
  @media (orientation: portrait) { #rotateHint { display: block; } }

  #loadingOverlay { background: rgba(20,60,90,.92); display: none; }
  #loadingOverlay .spin { font-size: 70px; animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg) } }
  #loadingOverlay p { margin-top: 16px; font-size: 24px; }

  #findPlayer { position: fixed; inset: auto 0 18% 0; z-index: 25; display: none; text-align: center; pointer-events: none; }
  #findPlayer .bubble { display: inline-block; background: rgba(255,255,255,.92); color: #333;
    font-size: clamp(24px, 5vw, 40px); font-weight: bold; padding: 18px 36px; border-radius: 24px;
    animation: bounce 1s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }

  #tooClose { position: fixed; inset: 0; z-index: 26; display: none;
    align-items: center; justify-content: center; pointer-events: none; background: rgba(180, 40, 0, .3); }
  #tooClose .bubble { background: rgba(255,255,255,.95); color: #d3322a; text-align: center;
    font-size: clamp(26px, 8vmin, 60px); font-weight: bold; padding: 4vmin 7vmin; border-radius: 4vmin; line-height: 1.5;
    animation: bounce 1s ease-in-out infinite; }
  #tooClose .count { font-size: clamp(44px, 16vmin, 120px); color: #ff8800; line-height: 1.2; }

  #countdown { position: fixed; inset: 0; z-index: 28; display: none; align-items: center; justify-content: center; pointer-events: none; }
  #countdown span { font-size: clamp(80px, 38vmin, 300px); font-weight: bold; color: #ffdd44;
    text-shadow: 0 0 50px #ff8800, 0 4px 10px rgba(0,0,0,.5); }
</style>

<body>
<canvas id="game"></canvas>

<div id="hud">
  <div id="hudL"><span id="hScore">🏆 0</span><span id="hCoin">🍬 0</span><span id="hRescue">🚑 0</span></div>
  <div id="hudR"><span id="hKm">0.0 KM</span></div>

  <button class="btn" id="btnBody">🏃 用身體玩（站在電視前）</button>
  <button class="btn" id="btnTouch">👆 用手指玩</button>
  <div class="hint">左右移動身體開嗶寶換車道、吃糖果愛心🍬❤️、閃開三角錐🚧（撞到會翻滾超好笑😆）！<br>看到受傷的小車車🤕就開過去救它！集滿能量<b>雙手高舉</b>就變身機器人衝刺🤖<br>影像只在裝置上運算，不會上傳。</div>
</div>

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

/* ================== 基本設定 ================== */
const canvas = document.getElementById('game');
let W = window.innerWidth, H = window.innerHeight;

/* ================== 音效（Web Audio 合成，不需音檔） ================== */
let AC = null;
function audioInit() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(freq, dur, type = 'sine', vol = 0.25, when = 0) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime + when);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + when + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(AC.currentTime + when); o.stop(AC.currentTime + when + dur + 0.05);
}
function sweep(f0, f1, dur, type, vol) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(f1, AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur + 0.05);
  o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + dur + 0.1);
}
function sfxCoin()      { [784, 988, 1319].forEach((f, i) => tone(f, 0.14, 'triangle', 0.22, i * 0.05)); }
function sfxHeart()     { [659, 880, 1175, 1568].forEach((f, i) => tone(f, 0.16, 'sine', 0.2, i * 0.06)); }
function sfxCrash()     { sweep(500, 90, 0.4, 'sawtooth', 0.3); tone(160, 0.2, 'square', 0.28, 0.05); tone(110, 0.25, 'square', 0.22, 0.18); }
function sfxBoing()     { sweep(180, 600, 0.18, 'sine', 0.28); sweep(600, 200, 0.22, 'sine', 0.24); }
function sfxRescue()    { [523, 659, 784, 1047].forEach((f, i) => tone(f, 0.22, 'sine', 0.22, i * 0.1)); tone(1319, 0.4, 'triangle', 0.18, 0.4); }
function sfxMagnet()    { sweep(300, 900, 0.3, 'sine', 0.2); tone(1200, 0.2, 'triangle', 0.16, 0.25); }
function sfxTransform() { sweep(220, 1200, 0.5, 'sawtooth', 0.22); [880,1175,1568].forEach((f,i)=>tone(f,0.18,'square',0.18,0.5+i*0.1)); }
function sfxSmash()     { tone(900, 0.06, 'square', 0.22); tone(500, 0.12, 'square', 0.18, 0.05); tone(260, 0.16, 'sawtooth', 0.16, 0.11); }
function sfxMilestone() { [659, 784, 880, 1047, 880, 1047, 1319].forEach((f, i) => tone(f, 0.3, 'square', 0.12, i * 0.12)); }
function sfxAlarm()     { [0, 0.4, 0.8].forEach(d => { tone(880, 0.2, 'square', 0.28, d); tone(587, 0.2, 'square', 0.28, d + 0.2); }); }
function sfxSiren()     { tone(740, 0.3, 'sine', 0.18); tone(560, 0.3, 'sine', 0.18, 0.3); }
function noiseLoop(filterType, freq, vol) {
  let src = null, gain = null, filt = null;
  return {
    on() {
      if (!AC || src) return;
      const buf = AC.createBuffer(1, AC.sampleRate, AC.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
      filt = AC.createBiquadFilter(); filt.type = filterType; filt.frequency.value = freq;
      gain = AC.createGain(); gain.gain.value = 0;
      src.connect(filt); filt.connect(gain); gain.connect(AC.destination);
      src.start();
      gain.gain.linearRampToValueAtTime(vol, AC.currentTime + 0.3);
    },
    setFreq(f) { if (filt) filt.frequency.setTargetAtTime(f, AC.currentTime, 0.1); },
    off() {
      if (!src) return;
      gain.gain.linearRampToValueAtTime(0, AC.currentTime + 0.2);
      const n = src; src = null;
      setTimeout(() => { try { n.stop(); } catch (e) {} }, 300);
    },
  };
}
const engineSfx = noiseLoop('lowpass', 280, 0.06);
function say(text) {
  try { const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.95; u.pitch = 1.2; speechSynthesis.speak(u); } catch (e) {}
}
const lastSay = {};
function sayT(key, text, gap = 2500) {
  const n = performance.now();
  if (lastSay[key] && n - lastSay[key] < gap) return;
  lastSay[key] = n; say(text);
}

/* ================== 世界座標 ================== */
const LANE_W = 3.05;           // 車道間距（加寬）
const ROAD_W = LANE_W * 3 + 2.0;
const LANES = [-1, 0, 1];      // 車道索引
const SPAWN_Z = -98;           // 物件生成的遠方 z
const DESPAWN_Z = 10;          // 通過後移除
const PLAYER_Z = 0;

/* ================== 遊戲狀態 ================== */
const state = {
  phase: 'menu', mode: null,
  laneX: 0, targetLane: 0,
  speed: 0.6, dist: 0,
  score: 0, coins: 0, rescued: 0,
  charge: 0, robot: 0, invuln: 0, crash: 0, crashSpin: 0,
  bob: 0, t: 0, shake: 0, paused: false,
};
const items = [];
const particles = [];
let roadScroll = 0, spawnTimer = 0, sirenTimer = 0, magnetT = 0;
const COIN_SUBS = ['🍬', '❤️', '🎈', '⭐', '🍭', '🧁'];
const PRAISE = ['Great driving!', 'Super ambulance!', 'You saved them!', 'Wow, amazing!'];

/* ================== Three.js 場景 ================== */
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(W, H, false);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
const FOG_COLOR = 0xdfeffb;
scene.fog = new THREE.Fog(FOG_COLOR, 34, 96);

const camera = new THREE.PerspectiveCamera(60, W / H, 0.1, 400);
camera.position.set(0, 3.5, 9);

// 光：半球柔光 + 太陽方向光
scene.add(new THREE.HemisphereLight(0xffffff, 0x8fb070, 1.15));
const sunLight = new THREE.DirectionalLight(0xfff2cc, 1.0);
sunLight.position.set(-10, 18, 8);
scene.add(sunLight);

// toon 階調貼圖
const toneArr = new Uint8Array([100, 165, 220, 255]);
const gradMap = new THREE.DataTexture(toneArr, toneArr.length, 1, THREE.RedFormat);
gradMap.needsUpdate = true;
const matCache = new Map();
function toon(color) {
  if (!matCache.has(color)) matCache.set(color, new THREE.MeshToonMaterial({ color, gradientMap: gradMap }));
  return matCache.get(color);
}

// 天空（漸層 + 太陽 + 雲，畫進背景貼圖）
function makeSky() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d');
  const g = x.createLinearGradient(0, 0, 0, 256);
  g.addColorStop(0, '#39a6dd'); g.addColorStop(0.55, '#84d2f0'); g.addColorStop(1, '#dfeffb');
  x.fillStyle = g; x.fillRect(0, 0, 256, 256);
  // 太陽光暈
  const sg = x.createRadialGradient(200, 50, 4, 200, 50, 70);
  sg.addColorStop(0, 'rgba(255,250,225,1)'); sg.addColorStop(0.4, 'rgba(255,244,200,.6)'); sg.addColorStop(1, 'rgba(255,244,200,0)');
  x.fillStyle = sg; x.fillRect(120, 0, 160, 140);
  // 雲
  x.fillStyle = 'rgba(255,255,255,.9)';
  const puff = (cx, cy, r) => { for (const [dx, dy, rr] of [[0,0,1],[-r*.7,r*.15,.7],[r*.7,r*.12,.72],[-r*.3,-r*.25,.6],[r*.32,-r*.2,.58]]) { x.beginPath(); x.ellipse(cx+dx, cy+dy, rr*r, rr*r*0.7, 0, 0, 7); x.fill(); } };
  puff(60, 60, 18); puff(120, 100, 14); puff(210, 120, 16);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}
scene.background = makeSky();

// 草地
const grass = new THREE.Mesh(new THREE.PlaneGeometry(800, 800), toon(0x86c95f));
grass.rotation.x = -Math.PI / 2; grass.position.set(0, -0.02, -120);
scene.add(grass);

// 連綿丘陵（半埋的扁球，兩側遠方）
const HILL_GEO = new THREE.SphereGeometry(1, 14, 10);
function addHill(x, z, r, color) {
  const h = new THREE.Mesh(HILL_GEO, toon(color));
  h.position.set(x, -r * 0.45, z); h.scale.set(r * 1.3, r * 0.7, r * 1.3);
  scene.add(h);
}
for (let i = 0; i < 7; i++) {
  const z = -45 - i * 9 - Math.random() * 6;
  addHill(-26 - Math.random() * 26, z, 9 + Math.random() * 8, i % 2 ? 0x7bbf54 : 0x8fce63);
  addHill(26 + Math.random() * 26, z, 9 + Math.random() * 8, i % 2 ? 0x8fce63 : 0x7bbf54);
}

// 馬路
function makeRoadTex() {
  const c = document.createElement('canvas'); c.width = 128; c.height = 512;
  const x = c.getContext('2d');
  x.fillStyle = '#5b626c'; x.fillRect(0, 0, 128, 512);
  // 柏油雜點
  for (let i = 0; i < 700; i++) { x.fillStyle = `rgba(${Math.random()<.5?80:40},${Math.random()<.5?86:46},96,.25)`; x.fillRect(Math.random()*128, Math.random()*512, 2, 2); }
  const u = wx => (wx / ROAD_W + 0.5) * 128; // 世界 x → 貼圖像素
  // 邊線（白實線，畫在最外側車道邊緣）
  x.fillStyle = 'rgba(255,255,255,.92)';
  x.fillRect(u(-LANE_W * 1.5) - 2, 0, 4, 512); x.fillRect(u(LANE_W * 1.5) - 2, 0, 4, 512);
  // 車道虛線（黃，畫在三車道之間的兩條分隔）
  x.fillStyle = 'rgba(255,225,120,.95)';
  for (const lx of [-LANE_W * 0.5, LANE_W * 0.5]) for (let y = 0; y < 512; y += 64) x.fillRect(u(lx) - 2.5, y, 5, 36);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace;
  t.wrapS = t.wrapT = THREE.RepeatWrapping; t.repeat.set(1, 26); t.anisotropy = 4;
  return t;
}
const roadTex = makeRoadTex();
const road = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W, 330), new THREE.MeshToonMaterial({ map: roadTex, gradientMap: gradMap }));
road.rotation.x = -Math.PI / 2; road.position.set(0, 0, -145);
scene.add(road);
// 路肩（土色）
const shoulder = new THREE.Mesh(new THREE.PlaneGeometry(ROAD_W + 3.2, 330), toon(0xc7a76a));
shoulder.rotation.x = -Math.PI / 2; shoulder.position.set(0, -0.01, -145);
scene.add(shoulder);

/* ---- 路邊樹 / 路燈 / 柵欄柱 池（會往玩家移動再回收） ---- */
const TRUNK_GEO = new THREE.CylinderGeometry(0.16, 0.22, 1, 6);
const LEAF_GEO = new THREE.IcosahedronGeometry(1, 0);
function makeTree(sz) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(TRUNK_GEO, toon(0x8a5a32)); trunk.scale.y = sz * 1.1; trunk.position.y = sz * 0.55; g.add(trunk);
  const c1 = new THREE.Mesh(LEAF_GEO, toon(0x4f9d33)); c1.scale.setScalar(sz * 0.95); c1.position.y = sz * 1.5; g.add(c1);
  const c2 = new THREE.Mesh(LEAF_GEO, toon(0x5fb03f)); c2.scale.setScalar(sz * 0.7); c2.position.set(sz*0.5, sz*1.15, 0); g.add(c2);
  const c3 = new THREE.Mesh(LEAF_GEO, toon(0x57a539)); c3.scale.setScalar(sz * 0.7); c3.position.set(-sz*0.5, sz*1.15, 0); g.add(c3);
  return g;
}
const POLE_GEO = new THREE.CylinderGeometry(0.09, 0.11, 1, 7);
function makeLamp() {
  const g = new THREE.Group();
  const pole = new THREE.Mesh(POLE_GEO, toon(0x9aa3ab)); pole.scale.y = 4.4; pole.position.y = 2.2; g.add(pole);
  const arm = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 1.0), toon(0x9aa3ab)); arm.position.set(0, 4.3, 0.5); g.add(arm);
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.22, 0.7), toon(0xd9dee2)); head.position.set(0, 4.2, 1.0); g.add(head);
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.16, 8, 6), new THREE.MeshBasicMaterial({ color: 0xfff3b0 })); bulb.position.set(0, 4.05, 1.0); g.add(bulb);
  return g;
}
const scenery = []; // {obj, x, z, span}
function addScenery(obj, x, z, span) { obj.position.set(x, 0, z); scene.add(obj); scenery.push({ obj, x, z, span }); }
for (let i = 0; i < 12; i++) { const side = i % 2 ? 1 : -1; addScenery(makeTree(0.9 + Math.random() * 0.7), side * (6 + Math.random() * 4), -i * 9 - Math.random() * 5, 108); }
for (let i = 0; i < 6; i++) { const side = i % 2 ? 1 : -1; addScenery(makeLamp(), side * 5.0, -i * 18 - 6, 108); }

/* ================== 嗶寶（救護車 / 機器人） ================== */
function faceTexture() {
  const c = document.createElement('canvas'); c.width = 256; c.height = 160;
  const x = c.getContext('2d');
  // 玻璃
  const g = x.createLinearGradient(0, 0, 0, 160); g.addColorStop(0, '#d7f1ff'); g.addColorStop(1, '#a6cfe4');

const video = document.getElementById('cam');
const pip = document.getElementById('pip');
const pipDot = document.getElementById('pipDot');
let poseLandmarker = null;
let lastVideoTime = -1, lastSeen = 0;
let personX = 0.5, armsUp = false, shoulderW = 0;
let tooCloseSince = 0, pauseUntil = 0, wasPaused = false;

async function setupBodyTracking() {
  const loadingText = document.getElementById('loadingText');
  loadingText.textContent = '正在啟動鏡頭…';
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
  loadingText.textContent = '正在載入 AI 模型…（第一次會久一點）';
  const { PoseLandmarker, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14');
  const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task', delegate: 'GPU' },
    runningMode: 'VIDEO', numPoses: 1,
  });
  pip.style.display = 'block';
}
function trackFrame() {
  if (!poseLandmarker || video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;
  let result;
  try { result = poseLandmarker.detectForVideo(video, performance.now()); } catch (e) { return; }
  const lm = result.landmarks && result.landmarks[0];
  if (lm) {
    lastSeen = performance.now();
    const cx = (lm[11].x + lm[12].x) / 2;
    personX = 1 - cx;
    shoulderW = Math.abs(lm[11].x - lm[12].x);
    const shoulderY = (lm[11].y + lm[12].y) / 2;
    const band = shoulderW * 0.5;
    armsUp = (shoulderY - lm[15].y) > band && (shoulderY - lm[16].y) > band;
    pipDot.style.left = (personX * 100) + '%';
    pipDot.style.top = armsUp ? '20%' : '50%';
    pipDot.style.background = armsUp ? '#ff66cc' : '#00ff88';
  }
}

/* ================== 開始流程 ================== */
const startOverlay = document.getElementById('startOverlay');

function goFullscreen() {
  if (document.fullscreenElement) return;
  if (matchMedia('(display-mode: fullscreen), (display-mode: standalone)').matches) return;
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen;
  if (fn) { try { const p = fn.call(el, { navigationUI: 'hide' }); if (p && p.catch) p.catch(() => {}); } catch (e) {} }
}
window.addEventListener('pointerdown', () => { if (state.phase !== 'menu') goFullscreen(); });

async function begin(mode) {

  startOverlay.style.display = 'none';
  try { await navigator.wakeLock.request('screen'); } catch (e) {}
  if (mode === 'body') {
    loadingOverlay.style.display = 'flex';
    try { await setupBodyTracking(); }
    catch (e) { loadingOverlay.style.display = 'none'; alert('鏡頭啟動失敗，改用手指模式吧！\n(' + e.message + ')'); state.mode = 'touch'; }
    loadingOverlay.style.display = 'none';

}

/* ================== 生成 ================== */
function pushItem(it) { it.obj = makeItemObj(it); it.z = SPAWN_Z; it.bob = Math.random() * 6; scene.add(it.obj); items.push(it); }
function spawnRow() {
  const r = Math.random();
  if (r < 0.10) pushItem({ kind: 'hurt', lane: LANES[Math.floor(Math.random()*3)], hit: false, hue: Math.floor(Math.random()*5) });
  else if (r < 0.16) pushItem({ kind: 'magnet', lane: LANES[Math.floor(Math.random()*3)], hit: false });
  else if (r < 0.48) {
    const blocked = Math.random() < 0.35 ? 2 : 1;
    const order = [0, 1, 2].sort(() => Math.random() - 0.5).slice(0, blocked);
    for (const li of order) pushItem({ kind: 'cone', lane: LANES[li], hit: false, sub: Math.random() < 0.5 ? '🚧' : '🪨' });
    const free = [0, 1, 2].find(li => !order.includes(li));
    if (free != null && Math.random() < 0.7) pushItem({ kind: 'coin', lane: LANES[free], hit: false, sub: COIN_SUBS[Math.floor(Math.random()*COIN_SUBS.length)] });
  } else {
    const li = Math.floor(Math.random() * 3);
    const sub = COIN_SUBS[Math.floor(Math.random()*COIN_SUBS.length)];
    pushItem({ kind: 'coin', lane: LANES[li], hit: false, sub });
    if (Math.random() < 0.5) pushItem({ kind: 'coin', lane: LANES[(li+1)%3], hit: false, sub });
  }
}

/* ================== 3D 粒子特效 ================== */
function burst3(pos, n, emojis, opt = {}) {
  for (let i = 0; i < n; i++) {
    const s = emojiSprite(emojis[Math.floor(Math.random()*emojis.length)], opt.size || 0.9);
    s.position.copy(pos);
    const a = Math.random() * Math.PI * 2, sp = (opt.sp || 4) * (0.4 + Math.random());
    particles.push({ sprite: s, vx: Math.cos(a)*sp, vy: (opt.up||4) + Math.random()*3, vz: Math.sin(a)*sp, life: opt.life||1, max: opt.life||1, grav: opt.grav ?? 9 });
    scene.add(s);
  }
}
const TMPV = new THREE.Vector3();

}

/* ================== 互動 ================== */
function collect(it) {
  it.hit = true;
  const pos = it.obj.position;
  if (it.kind === 'coin') {
    state.coins++; state.score += 10; state.charge = Math.min(1, state.charge + 0.07); sfxCoin();
    burst3(pos, 6, [it.sub, '✨'], { life: 0.7 });
    if (it.sub === '❤️') { state.score += 10; sfxHeart(); }
  } else if (it.kind === 'magnet') {
    magnetT = 6; state.charge = Math.min(1, state.charge + 0.1); sfxMagnet();
    burst3(pos, 12, ['🧲', '✨']); sayT('magnet', 'Magnet power!');
  } else if (it.kind === 'hurt') {
    state.rescued++; state.score += 50; state.charge = Math.min(1, state.charge + 0.2); sfxRescue();
    burst3(pos, 16, ['✚', '❤️', '✨', '🩹'], { up: 5 }); fireworks3();
    sayT('rescue', PRAISE[Math.floor(Math.random()*PRAISE.length)]);
    if (state.rescued % 5 === 0) sfxMilestone();
  }
}
function hitObstacle(it) {
  it.hit = true;
  const pos = it.obj.position;
  if (state.robot > 0 || state.invuln > 0) {
    state.score += 5; it.smashed = true; it.vy = 7 + Math.random()*4; it.spin = (Math.random()-0.5)*8;
    sfxSmash(); state.shake = Math.max(state.shake, 5);
    burst3(pos, 10, ['💥', '⭐']); sayT('smash', 'Boom!');
  } else {
    state.crash = 1.2; state.crashSpin = 0; state.invuln = 2.0;
    state.charge = Math.max(0, state.charge - 0.3); state.shake = 12;
    sfxCrash(); setTimeout(() => { if (AC) sfxBoing(); }, 250);
    burst3(pos, 14, ['💥', '😵', '💫', '⭐'], { up: 5 }); sayT('crash', 'Oops! Tumble!');
  }

/* ================== 更新 ================== */
function update(dt, now) {
  state.t += dt;
  if (state.mode === 'body') {
    trackFrame();
    state.targetLane = Math.max(-1, Math.min(1, (personX - 0.5) * 2.4));
    const nowMs = performance.now();
    const lost = poseLandmarker && nowMs - lastSeen > 2500;
    document.getElementById('findPlayer').style.display = (lost && state.phase === 'play') ? 'block' : 'none';
    if (shoulderW > 0.26 && nowMs - lastSeen < 500) { if (!tooCloseSince) tooCloseSince = nowMs; }
    else if (shoulderW < 0.21 || lost) { tooCloseSince = 0; }
    const tooCloseNow = !!tooCloseSince && nowMs - tooCloseSince > 400;
    if (state.phase === 'play') {
      if (tooCloseNow && nowMs >= pauseUntil) { pauseUntil = nowMs + 5000; sfxAlarm(); say('Too close! Step back, please!'); }
      state.paused = nowMs < pauseUntil;
    } else state.paused = false;
    document.getElementById('tooClose').style.display = state.paused ? 'flex' : 'none';
    if (state.paused) { const remain = Math.ceil((pauseUntil - nowMs) / 1000); document.getElementById('pauseCount').textContent = remain > 0 ? remain : ''; }
    if (wasPaused && !state.paused) say("OK! Let's go!");
    wasPaused = state.paused;
  }

  state.laneX += (state.targetLane - state.laneX) * Math.min(1, dt * 6);
  state.bob = Math.sin(state.t * 9) * 0.5 + Math.sin(state.t * 13) * 0.3;
  if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 16);

  if (state.paused) { engineSfx.setFreq(180); return; }

  const wantTransform = (state.mode === 'body' ? armsUp : tapTransform); tapTransform = false;
  if (wantTransform && state.charge >= 1 && state.robot <= 0 && state.crash <= 0) {
    state.robot = 6; state.charge = 0; state.invuln = Math.max(state.invuln, 6);
    sfxTransform(); fireworks3(); state.shake = 8; sayT('robot', 'Robot mode! Go go go!');
  }
  if (state.robot > 0) state.robot -= dt;
  if (state.invuln > 0) state.invuln -= dt;
  if (magnetT > 0) magnetT -= dt;
  if (state.crash > 0) { state.crash -= dt; state.crashSpin += dt * 14; }

  let targetSpeed = 0.6 + Math.min(0.45, state.dist * 0.0033);
  if (state.robot > 0) targetSpeed *= 1.55;
  if (state.crash > 0) targetSpeed *= 0.25;
  state.speed += (targetSpeed - state.speed) * Math.min(1, dt * 3);
  state.dist += state.speed * dt * 2.2;
  const moveSpeed = state.speed * 27;
  roadScroll += moveSpeed * dt;
  roadTex.offset.y = -roadScroll * 0.0125;
  engineSfx.setFreq(220 + state.speed * 240);

  sirenTimer -= dt; if (sirenTimer <= 0) { sfxSiren(); sirenTimer = 3.5 + Math.random()*3; }

  spawnTimer -= dt;
  const interval = Math.max(0.5, 0.95 - state.dist * 0.004);
  if (spawnTimer <= 0 && state.phase === 'play') { spawnRow(); spawnTimer = interval; }

  for (let i = items.length - 1; i >= 0; i--) {
    const it = items[i];
    it.z += moveSpeed * dt; it.bob += dt * 6;
    if (magnetT > 0 && it.kind === 'coin' && !it.hit && it.z > -40) it.lane += (state.laneX - it.lane) * Math.min(1, dt * 4);
    if (!it.hit && it.z > -1.8 && it.z < 2.4) {
      const near = Math.abs(it.lane - state.laneX) < 0.62;
      const magnetGrab = magnetT > 0 && it.kind === 'coin';
      if (near || magnetGrab) { if (it.kind === 'cone') hitObstacle(it); else collect(it); }
    }
    if (it.smashed) { it.vy -= dt * 16; it.z += dt * 6; }
    // 同步 3D 物件
    const o = it.obj;
    o.position.x = it.lane * LANE_W; o.position.z = it.z;
    if (it.kind === 'coin') { o.position.y = 1.0 + Math.sin(it.bob) * 0.18; o.rotation.y += dt * 2; }
    else if (it.kind === 'magnet') { o.position.y = 1.0 + Math.sin(it.bob) * 0.18; }
    else if (it.kind === 'hurt') { o.position.y = Math.sin(it.bob * 0.6) * 0.06; if (o.userData.sos) o.userData.sos.visible = Math.sin(state.t * 8) > 0; }
    else { o.position.y = 0; }
    if (it.smashed) { o.position.y = Math.max(0, (o.position.y || 0) + it.vy * dt); o.rotation.x += it.spin * dt; o.rotation.z += it.spin * dt; if (it.vy < -3) o.position.y = -2; }
    if (it.hit && !it.smashed) o.visible = false;
    if (it.z > DESPAWN_Z || (it.smashed && o.position.y < -1)) { scene.remove(o); items.splice(i, 1); }
  }

  // 粒子
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.sprite.position.x += p.vx * dt; p.sprite.position.y += p.vy * dt; p.sprite.position.z += p.vz * dt;
    p.vy -= p.grav * dt; p.life -= dt;
    p.sprite.material.opacity = Math.max(0, p.life / p.max);
    if (p.life <= 0) { scene.remove(p.sprite); particles.splice(i, 1); }
  }

  // 路邊景物移動回收
  for (const sc of scenery) {
    sc.z += moveSpeed * dt;
    if (sc.z > 12) sc.z -= sc.span;
    sc.obj.position.z = sc.z;
  }
}

/* ================== 3D 呈現 ================== */
function syncPlayerVisual(dt) {
  const px = state.laneX * LANE_W;
  player.position.x = px;
  const robot = state.robot > 0;
  carGroup.visible = !robot; robotGroup.visible = robot;
  // 車身上下晃 + 換道側傾
  player.position.y = Math.max(0, state.bob * 0.05);
  player.rotation.z = -(state.targetLane - state.laneX) * 0.25;
  player.rotation.x = 0; player.rotation.y = 0;
  if (state.crash > 0) { player.rotation.y = state.crashSpin; player.rotation.x = Math.sin(state.crashSpin) * 0.4; player.position.y += 0.2 + Math.abs(Math.sin(state.crashSpin)) * 0.3; }
  // 輪子轉
  const spin = state.speed * dt * 18;
  for (const w of wheels) w.rotation.x += spin;
  // 警示燈閃
  const blink = Math.sin(state.t * 8) > 0;
  carGroup.userData.lampR.material.color.setHex(blink ? 0xff3344 : 0x6a1722);
  carGroup.userData.lampB.material.color.setHex(blink ? 0x22408a : 0x3366ff);
  // 機器人揮手
  if (robot && robotGroup.userData.arms) { const sw = Math.sin(state.t * 12) * 0.5; robotGroup.userData.arms[0].rotation.z = 0.3 + sw; robotGroup.userData.arms[1].rotation.z = -0.3 - sw; }
  // 拖尾光暈
  const showAura = state.robot > 0 || state.invuln > 0;
  auraMat.opacity += ((showAura ? (0.45 + Math.sin(state.t * 20) * 0.2) : 0) - auraMat.opacity) * Math.min(1, dt * 8);
  auraMat.color.setHex(state.robot > 0 ? 0xffd54f : 0xbfe9ff);
}
function syncCamera(dt) {
  const px = state.laneX * LANE_W;
  const cx = px * 0.35 + (state.shake > 0 ? (Math.random()-0.5) * state.shake * 0.04 : 0);
  camera.position.x += (cx - camera.position.x) * Math.min(1, dt * 6);
  camera.position.y = 3.5 + (state.shake > 0 ? (Math.random()-0.5) * state.shake * 0.03 : 0);
  camera.position.z = 9;
  camera.lookAt(px * 0.5, 1.2, -14);
}

/* ================== HUD ================== */
const hScore = document.getElementById('hScore'), hCoin = document.getElementById('hCoin'), hRescue = document.getElementById('hRescue');
const hKm = document.getElementById('hKm'), hBarFill = document.getElementById('hudBarFill'), hBarText = document.getElementById('hudBarText'), hMag = document.getElementById('hudMag');
function syncHUD() {
  if (state.phase !== 'play') return;
  hScore.textContent = '🏆 ' + state.score;
  hCoin.textContent = '🍬 ' + state.coins;
  hRescue.textContent = '🚑 ' + state.rescued;
  hKm.textContent = state.dist.toFixed(1) + ' KM';
  hBarFill.style.width = (state.charge * 100) + '%';
  if (state.robot > 0) hBarText.textContent = '🤖 機器人衝刺！ ' + state.robot.toFixed(1) + 's';
  else if (state.charge >= 1) hBarText.textContent = state.mode === 'body' ? '✋ 雙手高舉變身！' : '👆 點上方變身！';
  else hBarText.textContent = '變身能量';
  hMag.textContent = magnetT > 0 ? '🧲 磁鐵 ' + magnetT.toFixed(1) + 's' : '';
}

/* ================== 主迴圈 ================== */
function onResize() {
  W = window.innerWidth; H = window.innerHeight;
  renderer.setSize(W, H, false);
  camera.aspect = W / H; camera.updateProjectionMatrix();
}
window.addEventListener('resize', onResize);
onResize();

let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000); lastT = now;
  if (state.phase !== 'menu') update(dt, now);
  syncPlayerVisual(dt); syncCamera(dt); syncHUD();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
