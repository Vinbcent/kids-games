<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<title>🚒 消防車救火隊</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #8fce5a; touch-action: none; }
  body { font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; }
  #game { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* HUD */
  #hud { position: fixed; inset: 0; z-index: 15; pointer-events: none; display: none;
         color: #fff; text-shadow: 0 2px 6px rgba(20,40,80,.55); font-weight: bold; }
  #hudL { position: absolute; top: 2.2vmin; left: 2.4vmin; font-size: clamp(16px, 4.6vmin, 42px); }
  #hudL span { margin-right: 1.4vmin; }
  #hudBarWrap { position: absolute; top: 1.8vmin; left: 50%; transform: translateX(-50%);
                width: min(54vw, 400px); height: clamp(16px, 3vmin, 26px);
                background: rgba(0,0,0,.28); border-radius: 999px; overflow: hidden; }
  #hudBarFill { height: 100%; width: 0%; border-radius: 999px;
                background: linear-gradient(90deg, #6fe0ff, #0066ff); transition: width .12s linear; }
  #hudBarText { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
                font-size: clamp(11px, 2.3vmin, 18px); }

  #pip { position: fixed; left: 12px; bottom: 12px; width: 160px; height: 120px;
    border: 3px solid rgba(255,255,255,.6); border-radius: 12px; overflow: hidden;
    display: none; z-index: 20; background: #000; }
  #pip video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #pipDot { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
    background: #00ff88; box-shadow: 0 0 8px #00ff88; transform: translate(-50%,-50%);
    transition: left .1s linear, top .1s linear, background .1s linear; }
  #pipHide { position: absolute; top: 2px; right: 2px; width: 28px; height: 28px;
    background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: 8px; font-size: 14px; }

  .overlay { position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff; }
  #startOverlay { background: linear-gradient(180deg, #ff7b5a 0%, #ffb27a 38%, #ffd98a 70%, #ffe9b0 100%); padding: 2vmin; overflow: hidden; }
  #startOverlay h1 { font-size: clamp(22px, 9vmin, 64px); margin-bottom: 1vmin; text-shadow: 0 3px 14px rgba(120,20,0,.45); }
  #startOverlay .big { font-size: clamp(44px, 16vmin, 140px); line-height: 1.1; animation: drive 1.4s ease-in-out infinite; }
  @keyframes drive { 0%,100% { transform: translateX(-2vmin) rotate(-2deg) } 50% { transform: translateX(2vmin) rotate(2deg) } }
  .btn { margin: 1.2vmin; padding: 1.8vmin 5vmin; font-size: clamp(15px, 5vmin, 32px); font-weight: bold;
    color: #fff; border: none; border-radius: 60px; cursor: pointer; box-shadow: 0 0.6vmin 0 rgba(0,0,0,.35); }
  .btn:active { transform: translateY(0.4vmin); box-shadow: 0 0.2vmin 0 rgba(0,0,0,.35); }
  #btnBody  { background: linear-gradient(180deg, #ff6a3d, #d3322a); }
  #btnTouch { background: linear-gradient(180deg, #00b8ff, #0066ff); }
  #startOverlay .hint { margin-top: 1.5vmin; font-size: clamp(10px, 3vmin, 18px); color: #fff8f0; max-width: 94%; line-height: 1.55; text-shadow: 0 1px 4px rgba(120,20,0,.5); }

  #rotateHint { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    background: rgba(0,0,0,.7); color: #ffee66; text-align: center;
    font-size: clamp(14px, 4vmin, 22px); font-weight: bold; padding: 2vmin; pointer-events: none; }
  @media (orientation: portrait) { #rotateHint { display: block; } }

  #loadingOverlay { background: rgba(120,30,10,.92); display: none; }
  #loadingOverlay .spin { font-size: 70px; animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg) } }
  #loadingOverlay p { margin-top: 16px; font-size: 24px; }

  #findPlayer { position: fixed; inset: auto 0 18% 0; z-index: 25; display: none; text-align: center; pointer-events: none; }
  #findPlayer .bubble { display: inline-block; background: rgba(255,255,255,.92); color: #333;
    font-size: clamp(24px, 5vw, 40px); font-weight: bold; padding: 18px 36px; border-radius: 24px;
    animation: bounce 1s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }

  #tooClose { position: fixed; inset: 0; z-index: 26; display: none;
    align-items: center; justify-content: center; pointer-events: none; background: rgba(180, 40, 0, .3); }
  #tooClose .bubble { background: rgba(255,255,255,.95); color: #d3322a; text-align: center;
    font-size: clamp(26px, 8vmin, 60px); font-weight: bold; padding: 4vmin 7vmin; border-radius: 4vmin; line-height: 1.5;
    animation: bounce 1s ease-in-out infinite; }
  #tooClose .count { font-size: clamp(44px, 16vmin, 120px); color: #ff8800; line-height: 1.2; }

  #countdown { position: fixed; inset: 0; z-index: 28; display: none; align-items: center; justify-content: center; pointer-events: none; }
  #countdown span { font-size: clamp(80px, 38vmin, 300px); font-weight: bold; color: #ffee44;
    text-shadow: 0 0 50px #ff8800, 0 4px 10px rgba(0,0,0,.5); }

  /* 過場卡（清場 / 消防小知識） */
  #tipCard { z-index: 27; display: none; background: rgba(8,30,60,.5); pointer-events: none; }
  #tipBig { font-size: clamp(34px, 12vmin, 120px); font-weight: bold; color: #fff; text-shadow: 0 0 40px #33c0ff, 0 4px 10px rgba(0,0,0,.5); animation: pop .5s ease-out; }
  #tipSub { margin-top: 2vmin; font-size: clamp(18px, 5.5vmin, 46px); font-weight: bold; color: #ffe9b0; text-shadow: 0 2px 8px rgba(0,0,0,.5); }
  @keyframes pop { 0% { transform: scale(.5); opacity: 0 } 100% { transform: scale(1); opacity: 1 } }

  /* 水砲全開 disco 彩光（水藍系） */
  #frenzyFx { position: fixed; inset: 0; z-index: 14; pointer-events: none; opacity: 0; transition: opacity .25s; mix-blend-mode: screen;
    background:
      radial-gradient(circle at 18% 28%, rgba(80,180,255,.32), transparent 42%),
      radial-gradient(circle at 82% 36%, rgba(120,240,255,.30), transparent 42%),
      radial-gradient(circle at 50% 82%, rgba(255,255,255,.24), transparent 46%),
      radial-gradient(circle at 50% 50%, rgba(80,140,255,.16), transparent 60%); }
  #frenzyFx.on { opacity: 1; animation: disco .7s linear infinite; }
  @keyframes disco { to { filter: hue-rotate(360deg); } }

  /* 危險紅暈（火勢越大越明顯） */
  #dangerFx { position: fixed; inset: 0; z-index: 13; pointer-events: none; opacity: 0; transition: opacity .3s;
    box-shadow: inset 0 0 22vmin 8vmin rgba(200,30,0,.55); }
</style>

{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<body>
<canvas id="game"></canvas>
<div id="dangerFx"></div>
<div id="frenzyFx"></div>

<div id="hud">
  <div id="hudL"><span id="hScore">🔥 熄滅 0</span><span id="hCombo"></span><span id="hMis">😹 0</span></div>
  <div id="hudBarWrap"><div id="hudBarFill"></div><div id="hudBarText">💧 消防能量</div></div>
</div>

<div id="rotateHint">📱 把手機轉橫的玩更好玩喔！</div>

<div id="pip">
  <video id="cam" playsinline muted autoplay></video>
  <div id="pipDot"></div>
  <button id="pipHide">✕</button>
</div>

<div id="findPlayer"><div class="bubble">🧍 站到鏡頭前面吧！</div></div>
<div id="tooClose"><div class="bubble">🛑 太靠近電視囉！<br>往後退～往後退～ 👣<div id="pauseCount" class="count"></div></div></div>
<div id="countdown"><span id="countNum"></span></div>
<div class="overlay" id="tipCard"><div id="tipBig"></div><div id="tipSub"></div></div>

<div class="overlay" id="loadingOverlay">
  <div class="spin">🚒</div>
  <p id="loadingText">正在準備消防隊…</p>
</div>

<div class="overlay" id="startOverlay">
  <div class="big">🚒</div>
  <h1>消防車救火隊</h1>
  <button class="btn" id="btnBody">🏃 用身體玩（站在電視前）</button>
  <button class="btn" id="btnTouch">👆 用手指玩</button>
  <div class="hint">🔥 火災警報！你是打火英雄！左右移動靠近火場，把<b>雙手握在一起</b>當水管噴水滅火 💦。<br>手<b>舉高</b>可以噴更遠、噴到高樓的火；遠一點的火要<b>走過去</b>才噴得到。<br>滅光一場就換下一個場景（共 6 關）！集滿能量<b>雙手高舉</b>，消防雲梯車<b>水砲全開</b> 🚒<br>影像只在裝置上運算，不會上傳。</div>
</div>

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

/* ================== 基本設定 ================== */
const canvas = document.getElementById('game');
let W = window.innerWidth, H = window.innerHeight;
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const NUMW = ['zero','one','two','three','four','five','six','seven','eight'];

/* ================== 音效（Web Audio 合成，不需音檔） ================== */
let AC = null;
function audioInit() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(freq, dur, type = 'sine', vol = 0.25, when = 0) {
  if (!AC || freq <= 0) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime + when);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + when + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(AC.currentTime + when); o.stop(AC.currentTime + when + dur + 0.05);
}
function sweep(f0, f1, dur, type, vol) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur + 0.05);
  o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + dur + 0.1);
}
function sfxCheer()  { [660, 880, 1047, 1319].forEach((f, i) => tone(f, 0.16, 'triangle', 0.16, i * 0.05)); }
function sfxFail()   { [520, 400, 300].forEach((f, i) => tone(f, 0.13, 'sawtooth', 0.13, i * 0.09)); sweep(600, 150, 0.28, 'square', 0.11); tone(150, 0.16, 'square', 0.15, 0.28); }
function sfxSiren()  { tone(660, 0.26, 'sine', 0.28); tone(880, 0.26, 'sine', 0.28, 0.26); tone(660, 0.26, 'sine', 0.28, 0.52); }
function sfxHiss()   { sweep(1200, 320, 0.3, 'sine', 0.12); }
function sfxMilestone() { [659, 784, 880, 1047, 880, 1047, 1319].forEach((f, i) => tone(f, 0.3, 'square', 0.12, i * 0.12)); }
function sfxFrenzy() { sweep(220, 1400, 0.5, 'sawtooth', 0.2); [880,1175,1568].forEach((f,i)=>tone(f,0.18,'square',0.16,0.5+i*0.1)); }
function sfxAlarm()  { [0, 0.4, 0.8].forEach(d => { tone(880, 0.2, 'square', 0.28, d); tone(587, 0.2, 'square', 0.28, d + 0.2); }); }

const lastSay = {};
function say(text) {
  try { const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.95; u.pitch = 1.2; speechSynthesis.speak(u); } catch (e) {}
}
function sayT(key, text, gap = 2500) {
  const n = performance.now();
  if (lastSay[key] && n - lastSay[key] < gap) return;
  lastSay[key] = n; say(text);
}

/* ================== 世界座標 ================== */
const KID_X_MAX = 4.2;          // 消防員左右可移動範圍
const EMIT = new THREE.Vector3(0, 1.5, -0.2);   // 噴嘴出水點（相對 x=kidX）
const REACH_BASE = 6.5, REACH_UP = 4.0;          // 水柱射程（手舉高延伸）
const WATER_SPEED = 14;
const GROW_RATE = 0.10, SCORCH_TIME = 3.0;       // 火成長速率、燒到最大停留幾秒才燒焦

/* ================== 遊戲狀態 ================== */
const state = {
  phase: 'menu', mode: null,
  kidX: 0, kidTargetX: 0,
  firesOut: 0, combo: 0, mischief: 0, energy: 0, sceneIdx: 0,
  frenzy: 0, frenzyShoot: 0, transT: 0,
  t: 0, shake: 0, paused: false,
};

/* ================== Three.js 場景 ================== */
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(W, H, false);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0xdfeffb, 26, 72);
const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 300);
camera.position.set(0, 4.6, 10.5);

scene.add(new THREE.HemisphereLight(0xffffff, 0x8fb070, 1.15));
const sunLight = new THREE.DirectionalLight(0xfff2cc, 1.0);
sunLight.position.set(-8, 16, 10); scene.add(sunLight);

const toneArr = new Uint8Array([100, 165, 220, 255]);
const gradMap = new THREE.DataTexture(toneArr, toneArr.length, 1, THREE.RedFormat);
gradMap.needsUpdate = true;
const matCache = new Map();
function toon(color) {
  if (!matCache.has(color)) matCache.set(color, new THREE.MeshToonMaterial({ color, gradientMap: gradMap }));
  return matCache.get(color);
}
function basic(color) { return new THREE.MeshBasicMaterial({ color }); }

/* 天空（每個場景不同色調，快取避免重複建） */
const skyCache = new Map();
function makeSky(top, mid, bot, sun = 'rgba(255,244,200,') {
  const key = top + mid + bot + sun;
  if (skyCache.has(key)) return skyCache.get(key);
  const c = document.createElement('canvas'); c.width = 256; c.height = 256;
  const x = c.getContext('2d');
  const g = x.createLinearGradient(0, 0, 0, 256);
  g.addColorStop(0, top); g.addColorStop(0.55, mid); g.addColorStop(1, bot);
  x.fillStyle = g; x.fillRect(0, 0, 256, 256);
  const sg = x.createRadialGradient(56, 46, 4, 56, 46, 72);
  sg.addColorStop(0, sun + '1)'); sg.addColorStop(0.4, sun + '.55)'); sg.addColorStop(1, sun + '0)');
  x.fillStyle = sg; x.fillRect(0, 0, 150, 140);
  x.fillStyle = 'rgba(255,255,255,.85)';
  const puff = (cx, cy, r) => { for (const [dx, dy, rr] of [[0,0,1],[-r*.7,r*.15,.7],[r*.7,r*.12,.72],[-r*.3,-r*.25,.6],[r*.32,-r*.2,.58]]) { x.beginPath(); x.ellipse(cx+dx, cy+dy, rr*r, rr*r*0.7, 0, 0, 7); x.fill(); } };
  puff(150, 55, 16); puff(205, 96, 13); puff(95, 108, 15);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; skyCache.set(key, t); return t;
}
scene.background = makeSky('#39a6dd', '#84d2f0', '#dfeffb');

/* 遠山 */
const HILL_GEO = new THREE.SphereGeometry(1, 14, 10);
function addHill(x, z, r, color) {
  const h = new THREE.Mesh(HILL_GEO, toon(color));
  h.position.set(x, -r * 0.45, z); h.scale.set(r * 1.4, r * 0.7, r * 1.4); scene.add(h);
}
for (let i = 0; i < 6; i++) { const z = -34 - i * 6; addHill(-24 - Math.random()*20, z, 8 + Math.random()*6, i%2?0x7bbf54:0x8fce63); addHill(24 + Math.random()*20, z, 8 + Math.random()*6, i%2?0x8fce63:0x7bbf54); }

/* 共用地面（每個場景重新上色） */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), toon(0x77807a));
ground.rotation.x = -Math.PI / 2; ground.position.set(0, -0.02, -30); scene.add(ground);

/* ================== emoji / 招牌 貼圖 ================== */
const emojiTexCache = new Map();
function emojiTex(e) {
  if (!emojiTexCache.has(e)) {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const x = c.getContext('2d'); x.textAlign = 'center'; x.textBaseline = 'middle'; x.font = '96px serif';
    x.fillText(e, 64, 72);
    const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; emojiTexCache.set(e, t);
  }
  return emojiTexCache.get(e);
}
function emojiSprite(e, size) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: emojiTex(e), transparent: true, depthWrite: false, depthTest: false }));
  s.scale.set(size, size, 1); return s;
}

/* ================== 消防員（3D） ================== */
let kid, kidArmPivot;
function buildKid() {
  const g = new THREE.Group();
  const skin = toon(0xf7cfa6), coat = toon(0xffb300), pants = toon(0x37474f), boot = toon(0x263238), helmet = toon(0xe53935);
  for (const sx of [-0.17, 0.17]) {
    const l = new THREE.Mesh(new RoundedBoxGeometry(0.26, 0.52, 0.28, 3, 0.1), pants); l.position.set(sx, 0.42, 0); g.add(l);
    const b = new THREE.Mesh(new RoundedBoxGeometry(0.28, 0.2, 0.34, 2, 0.08), boot); b.position.set(sx, 0.11, 0.04); g.add(b);
  }
  const body = new THREE.Mesh(new RoundedBoxGeometry(0.66, 0.74, 0.44, 3, 0.15), coat); body.position.y = 1.02; g.add(body);
  const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.68, 0.12, 0.46), toon(0xe0f2f1)); stripe.position.y = 0.9; g.add(stripe);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.32, 16, 14), skin); head.position.y = 1.66; g.add(head);
  const helm = new THREE.Mesh(new THREE.SphereGeometry(0.35, 16, 12, 0, Math.PI*2, 0, Math.PI*0.55), helmet); helm.position.y = 1.72; g.add(helm);
  const brim = new THREE.Mesh(new THREE.BoxGeometry(0.58, 0.08, 0.36), helmet); brim.position.set(0, 1.63, 0.06); g.add(brim);
  const face = emojiSprite('🙂', 0.42); face.position.set(0, 1.63, 0.32); g.add(face);
  // 雙手向前握水管（從胸前 pivot，會依瞄準旋轉）
  kidArmPivot = new THREE.Group(); kidArmPivot.position.set(0, 1.16, 0); g.add(kidArmPivot);
  for (const sx of [-0.32, 0.32]) { const arm = new THREE.Mesh(new RoundedBoxGeometry(0.16, 0.16, 0.62, 3, 0.07), coat); arm.position.set(sx, 0.02, -0.34); kidArmPivot.add(arm); }
  const noz = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.13, 0.5, 10), toon(0xb0bec5)); noz.rotation.x = Math.PI / 2; noz.position.set(0, 0, -0.64); kidArmPivot.add(noz);
  const tip = new THREE.Mesh(new THREE.ConeGeometry(0.14, 0.2, 10), toon(0x90a4ae)); tip.rotation.x = -Math.PI / 2; tip.position.set(0, 0, -0.92); kidArmPivot.add(tip);
  return g;
}

/* ================== 通用車輪 / 汽車底 ================== */
function addWheels(g, coords, r) {
  const wg = new THREE.CylinderGeometry(r, r, 0.42, 12);
  for (const [wx, wz] of coords) { const w = new THREE.Mesh(wg, toon(0x1e2126)); w.rotation.x = Math.PI / 2; w.position.set(wx, r, wz); g.add(w); }
}
const GLASS = 0xbfe6ff;
function buildCarBase(color, low) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new RoundedBoxGeometry(2.6, 0.7, 1.6, 3, 0.18), toon(color)); body.position.y = 0.62; g.add(body);
  const cabin = new THREE.Mesh(new RoundedBoxGeometry(1.5, 0.6, 1.4, 3, 0.16), toon(low ? 0xcfeaff : GLASS)); cabin.position.set(-0.1, 1.1, 0); g.add(cabin);
  addWheels(g, [[-0.8, -0.7], [0.8, -0.7], [-0.8, 0.7], [0.8, 0.7]], 0.32);
  return g;
}

/* ================== 場景道具 ================== */
function makeTree(sz) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, 1, 6), toon(0x8a5a32)); trunk.scale.y = sz*1.1; trunk.position.y = sz*0.55; g.add(trunk);
  const leaf = new THREE.Mesh(new THREE.IcosahedronGeometry(1, 0), toon(0x4f9d33)); leaf.scale.setScalar(sz*0.95); leaf.position.y = sz*1.5; g.add(leaf);
  return g;
}
function makeHouse(color) {
  const g = new THREE.Group();
  const body = new THREE.Mesh(new THREE.BoxGeometry(2.6, 2.2, 2.4), toon(color)); body.position.y = 1.1; g.add(body);

/* ================== 體感追蹤（MediaPipe Pose） ================== */
const video = document.getElementById('cam');
const pip = document.getElementById('pip');
const pipDot = document.getElementById('pipDot');
let poseLandmarker = null;
let lastVideoTime = -1, lastSeen = 0;
let personX = 0.5, shoulderW = 0, armsUp = false;
let tooCloseSince = 0, pauseUntil = 0, wasPaused = false;

// 手勢 / 瞄準
const JOIN_K = 0.60, RELEASE_K = 1.0, HOLD_MS = 200;
let handsNear = false, handsNearSince = 0, spraying = false;
let aimYaw = 0, aimPitch = 0.5, aimUp = 0.3;
let aimYawT = 0, aimPitchT = 0.5, aimUpT = 0.3;

async function setupBodyTracking() {
  const loadingText = document.getElementById('loadingText');
  loadingText.textContent = '正在啟動鏡頭…';
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
  loadingText.textContent = '正在載入 AI 模型…（第一次會久一點）';
  const { PoseLandmarker, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14');
  const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task', delegate: 'GPU' },
    runningMode: 'VIDEO', numPoses: 1,
  });
  pip.style.display = 'block';
}
function trackFrame() {
  if (!poseLandmarker || video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;
  let result;
  try { result = poseLandmarker.detectForVideo(video, performance.now()); } catch (e) { return; }
  const lm = result.landmarks && result.landmarks[0];
  if (!lm) return;
  const now = performance.now();
  lastSeen = now;
  const scx = (lm[11].x + lm[12].x) / 2, scy = (lm[11].y + lm[12].y) / 2;
  personX = 1 - scx;
  shoulderW = Math.abs(lm[11].x - lm[12].x);
  const sw = Math.max(0.05, shoulderW);
  const wmx = (lm[15].x + lm[16].x) / 2, wmy = (lm[15].y + lm[16].y) / 2;
  const wristGap = Math.hypot(lm[15].x - lm[16].x, lm[15].y - lm[16].y);
  handsNear = wristGap < sw * 1.1;
  // 雙手併攏噴水（遲滯 + 維持確認）
  const near = wristGap < sw * (spraying ? RELEASE_K : JOIN_K) && ((scy - wmy) > -sw * 0.5);
  if (near) { if (!handsNearSince) handsNearSince = now; } else handsNearSince = 0;
  const held = near && (now - handsNearSince > HOLD_MS);
  if (held) spraying = true;
  if (!near) spraying = false;
  // 瞄準（握拳中點相對肩中點，肩寬正規化）
  const aimX = clamp(-(wmx - scx) / sw, -1.4, 1.4);
  const aimU = clamp((scy - wmy) / sw, -0.3, 1.6);
  aimYawT = aimX * 0.5; aimPitchT = clamp(0.15 + aimU * 0.55, 0.1, 1.2); aimUpT = aimU;
  // 大絕：雙手高舉且分開（與併攏噴水互不衝突）
  const band = sw * 0.5;
  armsUp = (scy - lm[15].y) > band && (scy - lm[16].y) > band && wristGap > sw * 1.2;
  // pipDot
  pipDot.style.left = (personX * 100) + '%';
  pipDot.style.top = (spraying ? 30 : armsUp ? 18 : 50) + '%';
  pipDot.style.background = spraying ? '#33c0ff' : armsUp ? '#ff66cc' : handsNear ? '#ffd24d' : '#00ff88';
}

  aimYawT = (e.clientX / W - 0.5) * 1.0;
  const up = 1 - e.clientY / H;
  aimPitchT = clamp(0.15 + up * 1.0, 0.1, 1.2);
  aimUpT = up * 1.6;
}

});

}
function popText(pos, text, color = '#ffe14d') {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: textTex(text, color), transparent: true, depthWrite: false, depthTest: false }));
  s.scale.set(1.7, 0.85, 1); s.position.copy(pos); scene.add(s);
  particles.push({ sprite: s, vx: 0, vy: 1.9, vz: 0, life: 1.0, max: 1.0, grav: -1 });
}
/* 被救的小動物：跳走 + 愛心 */
function rescueCritter(f) {
  if (!f.critter || f.critter.saved) return;
  f.critter.saved = true;
  const cs = f.critter.sprite;
  if (sceneRoot) sceneRoot.remove(cs);
  scene.add(cs);
  particles.push({ sprite: cs, vx: f.critter.side * 3, vy: 4.6, vz: 2.4, life: 1.5, max: 1.5, grav: 6 });
  burst3(TMP.set(cs.position.x, cs.position.y + 0.5, cs.position.z), 6, ['❤️', '💕', '✨'], { up: 4 });
  sayT('rescue', pick(['You saved it! Yay!', 'Rescued! Woohoo!', 'Good job, hero!']), 900);
}

/* ================== 水柱 / 滅火 ================== */
function aimDir() { return DIR.set(Math.sin(aimYaw), Math.sin(aimPitch), -Math.cos(aimYaw) * Math.cos(aimPitch)).normalize(); }
function sprayReach() { return REACH_BASE + clamp(aimUp, 0, 1.6) * REACH_UP; }
function emitWater(dt) {
  const dir = aimDir();
  const ox = state.kidX + EMIT.x, oy = EMIT.y, oz = EMIT.z;
  const n = Math.max(1, Math.round(dt * 90));
  for (let i = 0; i < n; i++) {
    const s = emojiSprite(pick(['💧', '💦']), 0.34); s.position.set(ox + (Math.random()-0.5)*0.2, oy, oz);
    particles.push({ sprite: s, vx: dir.x*WATER_SPEED + (Math.random()-0.5)*1.6, vy: dir.y*WATER_SPEED + (Math.random()-0.5)*1.6, vz: dir.z*WATER_SPEED, life: 0.5, max: 0.5, grav: 14 });
    scene.add(s);
  }
}
function sprayCollide(dt) {
  const reach = sprayReach();
  const dir = aimDir();
  const ox = state.kidX + EMIT.x, oy = EMIT.y, oz = EMIT.z;
  for (const f of fires) {
    if (f.state !== 'burning') continue;
    const dx = f.x - ox, dy = f.y - oy, dz = f.z - oz;
    const dist = Math.hypot(dx, dy, dz) || 1;
    if (dist > reach) continue;
    if ((dx*dir.x + dy*dir.y + dz*dir.z) / dist < 0.80) continue;   // 錐形範圍外
    f.wet = Math.min(1, f.wet + dt * 1.0);
    f.size = Math.max(0, f.size - dt * 0.55 * f.wet);
    state.energy = Math.min(1, state.energy + dt * 0.04);
    if (Math.random() < dt * 22) { const s = emojiSprite('💨', 0.5); s.position.set(f.x, f.y, f.z); particles.push({ sprite: s, vx: 0, vy: 1.6, vz: 0, life: 0.5, max: 0.5, grav: -1 }); scene.add(s); }
    if (f.size <= 0.03) fireOut(f);
  }
}
function fireOut(f) {
  if (f.state !== 'burning') return;
  f.state = 'steam'; f.steamT = 0.8;
  f.flames.forEach(fl => fl.visible = false);
  if (f.glow) f.glow.visible = false;
  f.steamSprite = emojiSprite('💨', 0.7); f.steamSprite.position.set(0, 0.35, 0); f.group.add(f.steamSprite);
  sfxHiss();
  state.firesOut++; state.combo++;
  state.energy = Math.min(1, state.energy + 0.10);
  sfxCheer();
  burst3(TMP.set(f.x, f.y + 0.2, f.z), 7, ['💧', '✨'], { up: 3 });
  popText(TMP.set(f.x, f.y + 0.7, f.z), pick(['GOOD!', 'NICE!', '+1', 'YES!']), state.combo >= 3 ? '#ff7ad2' : '#ffe14d');
  rescueCritter(f);
  const remain = firesBurning();
  sayT('count', remain > 0 ? (NUMW[Math.min(remain, 8)] + ' ' + (remain === 1 ? 'fire' : 'fires') + ' left!') : 'All fires out! Great job!', 700);
}
function doScorch(f) {
  state.mischief++; state.combo = 0; state.shake = Math.max(state.shake, 6); sfxFail();
  burst3(TMP.set(f.x, f.y + 0.4, f.z), 6, ['💨', '🖤', '😹'], { up: 3, grav: 5 });
  spawnCat(TMP.set(f.x, f.y + 0.3, f.z)); say('Meow!');
  if (f.prop) { f.prop.rotation.z = (Math.random()<0.5?1:-1) * 0.18; if (!tilts.includes(f.prop)) tilts.push(f.prop); }
  f.size = 0.4; f.wet = 0; f.scorchT = 0;
}
function autoDouse() {
  for (const f of fires) {
    if (f.state !== 'burning') continue;
    f.wet = 1; f.size -= 0.6;
    if (Math.random() < 0.6) burst3(TMP.set(f.x, f.y, f.z), 2, ['💦', '💧'], { up: 2, life: 0.5 });
    if (f.size <= 0.03) fireOut(f);
  }
}

/* ================== 過場卡 ================== */
const tipCard = document.getElementById('tipCard'), tipBig = document.getElementById('tipBig'), tipSub = document.getElementById('tipSub');
function showCard(big, sub) { tipBig.textContent = big; tipSub.textContent = sub; tipCard.style.display = 'flex'; }
function hideCard() { tipCard.style.display = 'none'; }
function startClear() {
  state.phase = 'clearing'; state.transT = 1.2;
  fireworks3(); sfxMilestone();
  showCard('🎉 全部熄滅！', '太棒了！');
  say('All fires out! Great job!');
}
function showTip() {
  const S = SCENES[state.sceneIdx];
  showCard('🚒 消防小知識', S.tipZh);
  say(S.tip);
}
function nextScene() {
  hideCard();
  state.sceneIdx = (state.sceneIdx + 1) % SCENES.length;
  buildScene(state.sceneIdx);
  state.phase = 'play';
}

/* ================== 開始流程 ================== */
const startOverlay = document.getElementById('startOverlay');
const loadingOverlay = document.getElementById('loadingOverlay');
function goFullscreen() {
  if (document.fullscreenElement) return;
  if (matchMedia('(display-mode: fullscreen), (display-mode: standalone)').matches) return;
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen;
  if (fn) { try { const p = fn.call(el, { navigationUI: 'hide' }); if (p && p.catch) p.catch(() => {}); } catch (e) {} }
}
window.addEventListener('pointerdown', () => { if (state.phase !== 'menu') goFullscreen(); });
async function begin(mode) {
  goFullscreen(); audioInit(); state.mode = mode;
  startOverlay.style.display = 'none';
  try { await navigator.wakeLock.request('screen'); } catch (e) {}
  if (mode === 'body') {
    loadingOverlay.style.display = 'flex';
    try { await setupBodyTracking(); }
    catch (e) { loadingOverlay.style.display = 'none'; alert('鏡頭啟動失敗，改用手指模式吧！\n(' + e.message + ')'); state.mode = 'touch'; }
    loadingOverlay.style.display = 'none';
  }
  startCountdown();
}
document.getElementById('btnBody').addEventListener('click', () => begin('body'));
document.getElementById('btnTouch').addEventListener('click', () => begin('touch'));
document.getElementById('pipHide').addEventListener('click', () => pip.style.display = 'none');

if (!kid) { kid = buildKid(); scene.add(kid); }
if (!ladderTruck) { ladderTruck = buildLadderTruck(); scene.add(ladderTruck); }

/* ================== 環境氛圍：飄雲 + 圍觀路人（常駐，不隨場景清除） ================== */
const clouds = [];
for (let i = 0; i < 3; i++) {
  const cl = new THREE.Sprite(new THREE.SpriteMaterial({ map: emojiTex('☁️'), transparent: true, opacity: 0.9, depthWrite: false, depthTest: true }));
  const sz = 2.4 + Math.random() * 1.4; cl.scale.set(sz, sz * 0.7, 1);
  cl.position.set(rnd(-13, 13), 7 + Math.random() * 2.5, -17 - Math.random() * 6); scene.add(cl);
  clouds.push({ sprite: cl, sp: 0.25 + Math.random() * 0.35 });
}
const onlookers = [];
for (const [ox, oz] of [[-6.0, 1.8], [-4.8, 2.4], [6.0, 1.8]]) {
  const p = emojiSprite(pick(['🧍', '🧑', '👦', '👧', '🧓']), 0.95);
  p.position.set(ox, 0.75, oz); scene.add(p);
  onlookers.push({ sprite: p, ph: Math.random() * 6 });
}
const dangerFx = document.getElementById('dangerFx');
function startCountdown() {
  state.phase = 'countdown';
  state.firesOut = 0; state.combo = 0; state.mischief = 0; state.energy = 0; state.sceneIdx = 0; state.frenzy = 0;
  state.kidX = 0; state.kidTargetX = 0;
  for (const p of particles) scene.remove(p.sprite); particles.length = 0;
  buildScene(0);
  document.getElementById('hud').style.display = 'block';
  const el = document.getElementById('countdown'), num = document.getElementById('countNum');
  el.style.display = 'flex';
  const seq = ['3', '2', '1', '救火囉！'];
  say("Three, two, one, let's put out the fire!");
  let i = 0;
  const step = () => {
    if (i < seq.length) { num.textContent = seq[i]; num.style.animation = 'none'; void num.offsetWidth; tone(i < 3 ? 440 : 880, i < 3 ? 0.3 : 0.8, 'square', 0.2); i++; setTimeout(step, 900); }
    else { el.style.display = 'none'; state.phase = 'play'; state.t = 0; sfxSiren(); }
  };
  step();
}

/* ================== 更新 ================== */
function update(dt, now) {
  state.t += dt;

  if (state.mode === 'body') {
    trackFrame();
    state.kidTargetX = clamp((personX - 0.5) * 2 * KID_X_MAX * 1.15, -KID_X_MAX, KID_X_MAX);
    const nowMs = performance.now();
    const lost = poseLandmarker && nowMs - lastSeen > 2500;
    document.getElementById('findPlayer').style.display = (lost && state.phase === 'play') ? 'block' : 'none';
    if (shoulderW > 0.26 && nowMs - lastSeen < 500) { if (!tooCloseSince) tooCloseSince = nowMs; }
    else if (shoulderW < 0.21 || lost) { tooCloseSince = 0; }
    const tooCloseNow = !!tooCloseSince && nowMs - tooCloseSince > 400;
    if (state.phase === 'play') {
      if (tooCloseNow && nowMs >= pauseUntil) { pauseUntil = nowMs + 5000; sfxAlarm(); say('Too close! Step back, please!'); }
      state.paused = nowMs < pauseUntil;
    } else state.paused = false;
    document.getElementById('tooClose').style.display = state.paused ? 'flex' : 'none';
    if (state.paused) { const remain = Math.ceil((pauseUntil - nowMs) / 1000); document.getElementById('pauseCount').textContent = remain > 0 ? remain : ''; }
    if (wasPaused && !state.paused) say("OK! Let's go!");
    wasPaused = state.paused;
  }

  // 瞄準平滑
  aimYaw += (aimYawT - aimYaw) * Math.min(1, dt * 8);
  aimPitch += (aimPitchT - aimPitch) * Math.min(1, dt * 8);
  aimUp += (aimUpT - aimUp) * Math.min(1, dt * 8);

  // 放大絕：雙手高舉(體感) 或 點畫面上方(觸控)
  const wantFrenzy = (state.mode === 'body' ? armsUp : tapFrenzy); tapFrenzy = false;
  if (wantFrenzy && state.energy >= 1 && state.frenzy <= 0 && state.phase === 'play') {
    state.frenzy = 6; state.frenzyShoot = 0; state.energy = 0;
    sfxFrenzy(); fireworks3(); state.shake = 10; sayT('frenzy', 'Full power! Woohoo!');
  }
  if (state.frenzy > 0) {
    state.frenzy -= dt; state.frenzyShoot -= dt;
    if (state.frenzyShoot <= 0 && state.phase === 'play' && !state.paused) { autoDouse(); state.frenzyShoot = 0.06; }
  }
  document.getElementById('frenzyFx').classList.toggle('on', state.frenzy > 0);

  // 過場狀態機
  if (state.phase === 'clearing') { state.transT -= dt; if (state.transT <= 0) { state.phase = 'tip'; state.transT = 2.2; showTip(); } }
  else if (state.phase === 'tip') { state.transT -= dt; if (state.transT <= 0) nextScene(); }

  state.kidX += (state.kidTargetX - state.kidX) * Math.min(1, dt * 6);
  if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 16);

  if (state.paused) { updateParticles(dt); return; }

  // 噴水
  const doSpray = (state.mode === 'body' ? spraying : touchSpraying) && state.phase === 'play';
  if (doSpray) {
    emitWater(dt); sprayCollide(dt);
    if (Math.random() < dt * 9) tone(180 + Math.random()*120, 0.07, 'sawtooth', 0.03);
  }

  // 火：成長 / 視覺 / 蒸氣 / 燒焦
  for (const f of fires) {
    if (f.state === 'burning') {
      if (state.phase === 'play') {
        f.size = Math.min(f.maxSize, f.size + dt * GROW_RATE * (1 - f.wet));
        f.wet = Math.max(0, f.wet - dt * 0.35);
        if (f.size >= f.maxSize * 0.98) { f.scorchT += dt; if (f.scorchT > SCORCH_TIME) doScorch(f); } else f.scorchT = 0;
      }
      const sc = 0.45 + f.size * 0.9;
      f.flames.forEach((fl, k) => fl.scale.setScalar(sc * (0.8 + 0.2 * Math.sin(state.t*18 + fl.userData.ph + k))));
      if (f.glow) { f.glow.scale.setScalar(0.45 + f.size * 0.7); f.glow.material.opacity = 0.22 * Math.min(1, f.size); }
      // 竄升火星 + 越大越濃的煙（限總量，手機也順）
      if (state.phase === 'play' && particles.length < 210) {
        if (Math.random() < dt * 7 * f.size) { const e = emojiSprite(pick(['✨', '🔸', '⭐']), 0.2 + Math.random()*0.14); e.position.set(f.x + (Math.random()-0.5)*0.5, f.y + 0.3, f.z); scene.add(e); particles.push({ sprite: e, vx: (Math.random()-0.5)*0.7, vy: 1.3 + Math.random(), vz: 0, life: 0.9, max: 0.9, grav: -1.6 }); }
        if (Math.random() < dt * 4 * f.size) { const sm = emojiSprite('💨', 0.5 + f.size*0.6); sm.position.set(f.x + (Math.random()-0.5)*0.3, f.y + 0.45, f.z - 0.1); scene.add(sm); particles.push({ sprite: sm, vx: (Math.random()-0.5)*0.35, vy: 1.0 + Math.random()*0.6, vz: -0.2, life: 1.7, max: 1.7, grav: -0.5 }); }
      }
    } else if (f.state === 'steam') {
      f.steamT -= dt;
      if (f.steamSprite) { f.steamSprite.position.y += dt * 0.6; f.steamSprite.material.opacity = Math.max(0, f.steamT / 0.8); }
      if (f.steamT <= 0) {
        f.state = 'out';
        if (f.steamSprite) { f.group.remove(f.steamSprite); f.steamSprite = null; }
        const chk = emojiSprite('✅', 0.7); chk.position.set(f.x, f.y + 0.4, f.z); scene.add(chk);
        particles.push({ sprite: chk, vx: 0, vy: 1.4, vz: 0, life: 0.9, max: 0.9, grav: -1 });
      }
    }
  }

  // 清場判定
  if (state.phase === 'play' && fires.length > 0 && fires.every(f => f.state === 'out')) startClear();

  // 危險紅暈：火勢越大畫面邊緣越紅
  let dsum = 0; for (const f of fires) if (f.state === 'burning') dsum += f.size;
  dangerFx.style.opacity = Math.min(0.5, dsum * 0.045);

  updateParticles(dt);
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.sprite.position.x += p.vx*dt; p.sprite.position.y += p.vy*dt; p.sprite.position.z += p.vz*dt;
    p.vy -= p.grav*dt; p.life -= dt; p.sprite.material.opacity = Math.max(0, p.life / p.max);
    if (p.life <= 0) { scene.remove(p.sprite); particles.splice(i, 1); }
  }
}

/* ================== 呈現 ================== */
function syncVisual(dt) {
  const frenzy = state.frenzy > 0;
  kid.position.x = state.kidX;
  kid.position.y = Math.abs(Math.sin(state.t * 3)) * 0.03;
  kidArmPivot.rotation.y = aimYaw;
  kidArmPivot.rotation.x = -aimPitch * 0.5;

  ladderTruck.visible = frenzy;
  const L = ladderTruck.userData.ladder;
  if (frenzy) {
    ladderTruck.position.set(state.kidX - 2.6, 0, 0.4);
    L.scale.y += (1.4 - L.scale.y) * Math.min(1, dt * 3);
    L.rotation.z += (0.55 - L.rotation.z) * Math.min(1, dt * 3);
    if (ladderTruck.userData.beacon) ladderTruck.userData.beacon.material.color.setHex(Math.sin(state.t*12) > 0 ? 0x33a0ff : 0x0a3a66);
  } else {
    L.scale.y += (0.4 - L.scale.y) * Math.min(1, dt * 4);
  }

  const cx = state.kidX * 0.32 + (state.shake > 0 ? (Math.random()-0.5)*state.shake*0.04 : 0);
  camera.position.x += (cx - camera.position.x) * Math.min(1, dt * 6);
  camera.position.y = 4.6 + (state.shake > 0 ? (Math.random()-0.5)*state.shake*0.03 : 0);
  const tz = frenzy ? 8.8 : (state.phase === 'clearing' || state.phase === 'tip') ? 12.0 : 10.5;
  camera.position.z += (tz - camera.position.z) * Math.min(1, dt * 2.5);
  camera.lookAt(state.kidX * 0.2, 1.6, -6);

  // 燒焦道具慢慢扶正
  for (let i = tilts.length - 1; i >= 0; i--) {
    const p = tilts[i];
    p.rotation.z += (0 - p.rotation.z) * Math.min(1, dt * 3);
    if (Math.abs(p.rotation.z) < 0.01) { p.rotation.z = 0; tilts.splice(i, 1); }
  }

  // 飄雲
  for (const c of clouds) { c.sprite.position.x += c.sp * dt; if (c.sprite.position.x > 14) c.sprite.position.x = -14; }
  // 圍觀路人跳動（火大或狂歡時更激動）
  const hype = frenzy ? 9 : 4;
  for (const o of onlookers) { o.sprite.position.y = 0.75 + Math.abs(Math.sin(state.t * hype + o.ph)) * (frenzy ? 0.22 : 0.12); }
}

/* ================== HUD ================== */
const hScore = document.getElementById('hScore'), hCombo = document.getElementById('hCombo'), hMis = document.getElementById('hMis');
const hBarFill = document.getElementById('hudBarFill'), hBarText = document.getElementById('hudBarText');
function syncHUD() {
  if (state.phase === 'menu') return;
  hScore.textContent = '🔥 熄滅 ' + state.firesOut;
  hCombo.textContent = state.combo >= 3 ? '⚡ ' + state.combo + ' 連續' : '';
  hMis.textContent = '😹 ' + state.mischief;
  hBarFill.style.width = (state.energy * 100) + '%';
  if (state.frenzy > 0) hBarText.textContent = '🚒 水砲全開！ ' + state.frenzy.toFixed(1) + 's';
  else if (state.energy >= 1) hBarText.textContent = state.mode === 'body' ? '✋ 雙手高舉放水砲！' : '👆 點上方放水砲！';
  else hBarText.textContent = '💧 消防能量';
}

/* ================== 主迴圈 ================== */
function onResize() { W = window.innerWidth; H = window.innerHeight; renderer.setSize(W, H, false); camera.aspect = W / H; camera.updateProjectionMatrix(); }
window.addEventListener('resize', onResize); onResize();

let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000); lastT = now;
  if (state.phase !== 'menu') update(dt, now);
  syncVisual(dt); syncHUD();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
