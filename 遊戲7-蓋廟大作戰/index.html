<html lang="zh-Hant">
<head>

<title>🛕 蓋廟大作戰</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f0d9a0; touch-action: none; }
  body { font-family: "Microsoft JhengHei", "Noto Sans TC", sans-serif; }
  #game { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  #hud { position: fixed; inset: 0; z-index: 15; pointer-events: none; display: none;
         color: #fff; text-shadow: 0 2px 6px rgba(80,30,0,.6); font-weight: bold; }
  #hudL { position: absolute; top: 2.2vmin; left: 2.4vmin; font-size: clamp(16px, 4.6vmin, 42px); }
  #hudBarWrap { position: absolute; top: 1.8vmin; left: 50%; transform: translateX(-50%);
                width: min(56vw, 420px); height: clamp(20px, 3.4vmin, 30px);
                background: rgba(0,0,0,.28); border-radius: 999px; overflow: hidden; }
  #hudBarFill { height: 100%; width: 0%; border-radius: 999px;
                background: linear-gradient(90deg, #ffd24a, #ff8a1a); transition: width .12s linear; }
  #hudBarText { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
                font-size: clamp(12px, 2.6vmin, 20px); }
  #stepTip { position: absolute; top: 6.6vmin; left: 50%; transform: translateX(-50%);
             font-size: clamp(15px, 4.2vmin, 34px); white-space: nowrap; text-align: center; }

  #pip { position: fixed; left: 12px; bottom: 12px; width: 160px; height: 120px;
    border: 3px solid rgba(255,255,255,.6); border-radius: 12px; overflow: hidden;
    display: none; z-index: 20; background: #000; }
  #pip video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
  #pipDot { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%;
    background: #00ff88; box-shadow: 0 0 8px #00ff88; transform: translate(-50%,-50%);
    transition: left .1s linear, top .1s linear, background .1s linear; }
  #pipHide { position: absolute; top: 2px; right: 2px; width: 28px; height: 28px;
    background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: 8px; font-size: 14px; }

  .overlay { position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; color: #fff; }
  #startOverlay { background: linear-gradient(180deg, #d94f3a 0%, #e88a4a 40%, #f4c95a 72%, #f7e4a8 100%); padding: 2vmin; overflow: hidden; }
  #startOverlay h1 { font-size: clamp(22px, 9vmin, 64px); margin-bottom: 1vmin; text-shadow: 0 3px 14px rgba(120,20,0,.45); }
  #startOverlay .big { font-size: clamp(44px, 16vmin, 140px); line-height: 1.1; animation: sway 1.6s ease-in-out infinite; }
  @keyframes sway { 0%,100% { transform: translateY(0) rotate(-3deg) } 50% { transform: translateY(-1.6vmin) rotate(3deg) } }
  .btn { margin: 1.2vmin; padding: 1.8vmin 5vmin; font-size: clamp(15px, 5vmin, 32px); font-weight: bold;
    color: #fff; border: none; border-radius: 60px; cursor: pointer; box-shadow: 0 0.6vmin 0 rgba(0,0,0,.35); }
  .btn:active { transform: translateY(0.4vmin); box-shadow: 0 0.2vmin 0 rgba(0,0,0,.35); }
  #btnBody  { background: linear-gradient(180deg, #ff6a3d, #d3322a); }
  #btnTouch { background: linear-gradient(180deg, #ffb300, #e08800); }
  #startOverlay .hint { margin-top: 1.5vmin; font-size: clamp(10px, 3vmin, 18px); color: #fff8f0; max-width: 94%; line-height: 1.6; text-shadow: 0 1px 4px rgba(120,20,0,.5); }

  #rotateHint { display: none; position: fixed; top: 0; left: 0; right: 0; z-index: 40;
    background: rgba(0,0,0,.7); color: #ffee66; text-align: center;
    font-size: clamp(14px, 4vmin, 22px); font-weight: bold; padding: 2vmin; pointer-events: none; }
  @media (orientation: portrait) { #rotateHint { display: block; } }

  #loadingOverlay { background: rgba(150,50,20,.92); display: none; }
  #loadingOverlay .spin { font-size: 70px; animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg) } }
  #loadingOverlay p { margin-top: 16px; font-size: 24px; }

  #findPlayer { position: fixed; inset: auto 0 18% 0; z-index: 25; display: none; text-align: center; pointer-events: none; }
  #findPlayer .bubble { display: inline-block; background: rgba(255,255,255,.92); color: #333;
    font-size: clamp(24px, 5vw, 40px); font-weight: bold; padding: 18px 36px; border-radius: 24px;
    animation: bounce 1s ease-in-out infinite; }
  @keyframes bounce { 0%,100% { transform: translateY(0) } 50% { transform: translateY(-10px) } }

  #tooClose { position: fixed; inset: 0; z-index: 26; display: none;
    align-items: center; justify-content: center; pointer-events: none; background: rgba(180, 40, 0, .3); }
  #tooClose .bubble { background: rgba(255,255,255,.95); color: #d3322a; text-align: center;
    font-size: clamp(26px, 8vmin, 60px); font-weight: bold; padding: 4vmin 7vmin; border-radius: 4vmin; line-height: 1.5;
    animation: bounce 1s ease-in-out infinite; }
  #tooClose .count { font-size: clamp(44px, 16vmin, 120px); color: #ff8800; line-height: 1.2; }

  #countdown { position: fixed; inset: 0; z-index: 28; display: none; align-items: center; justify-content: center; pointer-events: none; }
  #countdown span { font-size: clamp(80px, 38vmin, 300px); font-weight: bold; color: #ffee44;
    text-shadow: 0 0 50px #ff8800, 0 4px 10px rgba(0,0,0,.5); }

  #zoneToast { position: fixed; top: 12vmin; left: 50%; transform: translateX(-50%); z-index: 27; pointer-events: none;
    background: rgba(120,30,10,.62); color: #fff; font-weight: bold; padding: 1.3vmin 3.6vmin; border-radius: 999px;
    font-size: clamp(15px, 3.8vmin, 32px); opacity: 0; transition: opacity .3s; white-space: nowrap;
    box-shadow: 0 2px 12px rgba(0,0,0,.4); }

  #partyFx { position: fixed; inset: 0; z-index: 14; pointer-events: none; opacity: 0; transition: opacity .3s; mix-blend-mode: screen;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,80,60,.30), transparent 42%),
      radial-gradient(circle at 80% 34%, rgba(255,210,70,.30), transparent 42%),
      radial-gradient(circle at 50% 82%, rgba(255,150,40,.24), transparent 46%); }
  #partyFx.on { opacity: 1; animation: disco .8s linear infinite; }
  @keyframes disco { to { filter: hue-rotate(360deg); } }

  #smashBtn { position: fixed; right: 3vmin; bottom: 3vmin; z-index: 22; display: none;
    width: clamp(60px, 15vmin, 110px); height: clamp(60px, 15vmin, 110px); border-radius: 50%;
    font-size: clamp(30px, 8vmin, 60px); border: none; color: #fff;
    background: radial-gradient(circle at 40% 35%, #ff8a5a, #c0392b);
    box-shadow: 0 0.8vmin 0 rgba(0,0,0,.4), 0 0 3vmin rgba(255,120,60,.6); cursor: pointer; }
  #smashBtn:active { transform: translateY(0.4vmin) scale(.94); }
</style>

<canvas id="game"></canvas>
<div id="partyFx"></div>

<div id="hud">
  <div id="hudL"><span id="hCount">🛕 蓋好 0</span></div>
  <div id="hudBarWrap"><div id="hudBarFill"></div><div id="hudBarText"></div></div>

</div>

<div id="rotateHint">📱 把手機轉橫的蓋廟更好玩喔！</div>

<div id="pip">
  <video id="cam" playsinline muted autoplay></video>
  <div id="pipDot"></div>
  <button id="pipHide">✕</button>
</div>

<div id="findPlayer"><div class="bubble">🧍 站到鏡頭前面吧！</div></div>
<div id="tooClose"><div class="bubble">🛑 太靠近電視囉！<br>往後退～往後退～ 👣<div id="pauseCount" class="count"></div></div></div>
<div id="countdown"><span id="countNum"></span></div>

<div class="overlay" id="loadingOverlay">
  <div class="spin">🛕</div>
  <p id="loadingText">正在準備工地…</p>
</div>

<div class="overlay" id="startOverlay">
  <div class="big">🛕</div>
  <h1>蓋廟大作戰</h1>
  <button class="btn" id="btnBody">🏃 用身體玩（站在電視前）</button>
  <button class="btn" id="btnTouch">👆 用手指玩</button>
  <div class="hint">🧱 你是小小建廟師傅！一起蓋一座媽祖廟：<b>蹲下</b>挖地基 → <b>雙手高舉</b>倒水泥 → <b>左右移動</b>把水泥壓平 → 把建材<b>移到發光的位置</b>吊上鷹架，蓋起紅柱和屋頂 → 請上千里眼、順風耳和媽祖 → 舞龍舞獅慶祝落成！🐉🦁<br>放錯地方？破壞車會開來「碰！」把它砸掉重來，超好笑 💥。<br>影像只在裝置上運算，不會上傳。</div>
</div>

<script type="module">
import * as THREE from 'three';
import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';

/* ================== 基本設定 ================== */
const canvas = document.getElementById('game');
let W = window.innerWidth, H = window.innerHeight;
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const rnd = (a, b) => a + Math.random() * (b - a);
const chance = p => Math.random() < p;

/* ================== 音效 ================== */
let AC = null;
function audioInit() { if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)(); }
function tone(freq, dur, type = 'sine', vol = 0.25, when = 0) {
  if (!AC || freq <= 0) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, AC.currentTime + when);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + when + dur);
  o.connect(g); g.connect(AC.destination);
  o.start(AC.currentTime + when); o.stop(AC.currentTime + when + dur + 0.05);
}
function sweep(f0, f1, dur, type, vol) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), AC.currentTime + dur);
  g.gain.setValueAtTime(vol, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur + 0.05);
  o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + dur + 0.1);
}
function sfxCheer()  { [660, 880, 1047, 1319].forEach((f, i) => tone(f, 0.16, 'triangle', 0.16, i * 0.05)); }
function sfxDig()    { sweep(300, 120, 0.2, 'sawtooth', 0.14); tone(90, 0.14, 'square', 0.14, 0.02); }
function sfxPour()   { sweep(500, 260, 0.18, 'sine', 0.07); }
function sfxRoll()   { tone(70, 0.18, 'sawtooth', 0.06); }
function sfxPlace()  { [523, 784, 1047].forEach((f, i) => tone(f, 0.14, 'triangle', 0.16, i * 0.05)); tone(160, 0.12, 'square', 0.12, 0.02); }
function sfxSmash()  { sweep(400, 70, 0.35, 'square', 0.22); [220,160,110].forEach((f,i)=>tone(f,0.16,'sawtooth',0.16,i*0.05)); }
function sfxGong()   { tone(196, 1.4, 'sine', 0.3); tone(294, 1.2, 'sine', 0.18, 0.02); tone(392, 1.0, 'sine', 0.12, 0.04); }
function sfxFirecracker() { for (let i=0;i<6;i++) tone(rnd(400,1200), 0.05, 'square', 0.12, i*0.06); }
function sfxParty()  { [523,659,784,1047,1319].forEach((f,i)=>tone(f,0.24,'triangle',0.14,i*0.1)); }
function sfxAlarm()  { [0, 0.4, 0.8].forEach(d => { tone(880, 0.2, 'square', 0.28, d); tone(587, 0.2, 'square', 0.28, d + 0.2); }); }

const lastSay = {};
function say(text) {
  try { const u = new SpeechSynthesisUtterance(text); u.lang = 'en-US'; u.rate = 0.95; u.pitch = 1.2; speechSynthesis.speak(u); } catch (e) {}
}
function sayT(key, text, gap = 2500) {
  const n = performance.now();
  if (lastSay[key] && n - lastSay[key] < gap) return;
  lastSay[key] = n; say(text);
}

/* ================== 世界參數 ================== */
const KID_X_MAX = 2.9;
const PLOT_Z = -6;            // 工地/廟宇在此
const SLAB_TOP = 0.35;        // 水泥板頂面（廟宇 local y 基準）

const state = {
  phase: 'menu', mode: null,
  kidX: 0, kidTargetX: 0,
  built: 0, step: 'dig', prog: 0,
  toastT: 0, party: 0,
  t: 0, shake: 0, paused: false,
};

/* ================== Three.js 場景 ================== */
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(W, H, false);
renderer.outputColorSpace = THREE.SRGBColorSpace;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x9fd0ea);
scene.fog = new THREE.Fog(0xd6e6ea, 26, 80);
const camera = new THREE.PerspectiveCamera(55, W / H, 0.1, 300);
camera.position.set(0, 4.4, 10.5);

const hemiLight = new THREE.HemisphereLight(0xffffff, 0xcaa870, 1.15); scene.add(hemiLight);
const sunLight = new THREE.DirectionalLight(0xfff2cc, 1.0);
sunLight.position.set(-8, 16, 10); scene.add(sunLight);

const toneArr = new Uint8Array([100, 165, 220, 255]);
const gradMap = new THREE.DataTexture(toneArr, toneArr.length, 1, THREE.RedFormat);
gradMap.needsUpdate = true;
const matCache = new Map();
function toon(color) {
  if (!matCache.has(color)) matCache.set(color, new THREE.MeshToonMaterial({ color, gradientMap: gradMap }));
  return matCache.get(color);
}
function basic(color) { return new THREE.MeshBasicMaterial({ color }); }

/* 地面 */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(400, 400), new THREE.MeshToonMaterial({ color: 0x9c8f66, gradientMap: gradMap }));
ground.rotation.x = -Math.PI / 2; ground.position.set(0, -0.02, -28); scene.add(ground);
/* 工地泥土地台 */
const yard = new THREE.Mesh(new THREE.BoxGeometry(9, 0.3, 6), toon(0x8a6a3a));
yard.position.set(0, 0.13, PLOT_Z); scene.add(yard);

/* 遠山 */
const HILL_GEO = new THREE.SphereGeometry(1, 14, 10);
function addHill(x, z, r, color) {
  const h = new THREE.Mesh(HILL_GEO, toon(color));
  h.position.set(x, -r * 0.45, z); h.scale.set(r * 1.4, r * 0.7, r * 1.4); scene.add(h);
}
for (let i = 0; i < 6; i++) { const z = -34 - i * 6; addHill(-24 - Math.random()*20, z, 8 + Math.random()*6, i%2?0x7bbf54:0x8fce63); addHill(24 + Math.random()*20, z, 8 + Math.random()*6, i%2?0x8fce63:0x7bbf54); }

/* ================== emoji / canvas 貼圖 ================== */
const emojiTexCache = new Map();
function emojiTex(e) {
  if (!emojiTexCache.has(e)) {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const x = c.getContext('2d'); x.textAlign = 'center'; x.textBaseline = 'middle'; x.font = '96px serif';
    x.fillText(e, 64, 72);
    const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; emojiTexCache.set(e, t);
  }
  return emojiTexCache.get(e);
}
function emojiSprite(e, size) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: emojiTex(e), transparent: true, depthWrite: false, depthTest: false }));
  s.scale.set(size, size, 1); return s;
}
/* 用 canvas 畫出來的原創立牌貼圖 */
function drawTex(S, fn) {
  const c = document.createElement('canvas'); c.width = c.height = S;
  const x = c.getContext('2d'); fn(x, S);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = 4; return t;
}
function pic(tex, w, h, depthTest = true) {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false, depthTest }));
  s.scale.set(w, h, 1); return s;
}
const textCache = new Map();
function textTex(text, color) {
  const key = text + color;
  if (textCache.has(key)) return textCache.get(key);
  const c = document.createElement('canvas'); c.width = 256; c.height = 128;
  const x = c.getContext('2d'); x.font = 'bold 66px "Microsoft JhengHei", sans-serif'; x.textAlign = 'center'; x.textBaseline = 'middle';
  x.lineWidth = 9; x.strokeStyle = 'rgba(0,0,0,.55)'; x.strokeText(text, 128, 66);
  x.fillStyle = color; x.fillText(text, 128, 66);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; textCache.set(key, t); return t;
}

/* 太陽 + 雲 */
function makeSunTex() {
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const x = c.getContext('2d'); const g = x.createRadialGradient(64, 64, 4, 64, 64, 64);
  g.addColorStop(0, 'rgba(255,250,220,1)'); g.addColorStop(0.4, 'rgba(255,240,190,.5)'); g.addColorStop(1, 'rgba(255,240,190,0)');
  x.fillStyle = g; x.fillRect(0, 0, 128, 128);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}
const sun = new THREE.Sprite(new THREE.SpriteMaterial({ map: makeSunTex(), transparent: true, depthWrite: false, depthTest: false }));
sun.scale.set(9, 9, 1); sun.position.set(-11, 10, -30); scene.add(sun);
const clouds = [];
for (let i = 0; i < 3; i++) {
  const cl = new THREE.Sprite(new THREE.SpriteMaterial({ map: emojiTex('☁️'), transparent: true, opacity: 0.9, depthWrite: false, depthTest: true }));
  const sz = 2.4 + Math.random() * 1.4; cl.scale.set(sz, sz * 0.7, 1);
  cl.position.set(rnd(-13, 13), 7 + Math.random() * 2.5, -18 - Math.random() * 6); scene.add(cl);
  clouds.push({ sprite: cl, sp: 0.25 + Math.random() * 0.35 });
}

/* ================== 原創手繪：媽祖 / 千里眼 / 順風耳 / 龍 / 獅 ================== */
// 共用小工具
function ellipse(x, cx, cy, rx, ry, fill) { x.beginPath(); x.ellipse(cx, cy, rx, ry, 0, 0, 7); x.fillStyle = fill; x.fill(); }
function bigEye(x, cx, cy, r, look = 0) {
  x.beginPath(); x.arc(cx, cy, r, 0, 7); x.fillStyle = '#fff'; x.fill(); x.lineWidth = r * 0.18; x.strokeStyle = '#3a2a20'; x.stroke();
  x.beginPath(); x.arc(cx + look, cy + r * 0.12, r * 0.5, 0, 7); x.fillStyle = '#20140c'; x.fill();
  x.beginPath(); x.arc(cx + look - r * 0.18, cy - r * 0.1, r * 0.16, 0, 7); x.fillStyle = '#fff'; x.fill();
}
// 媽祖：鳳冠珠簾、紅金袍、慈祥
let TEX_MAZU = null;
function texMazu() { return TEX_MAZU || (TEX_MAZU = drawTex(256, (x, S) => {
  // 金色光暈
  const g = x.createRadialGradient(128, 120, 20, 128, 120, 130);
  g.addColorStop(0, 'rgba(255,236,150,.9)'); g.addColorStop(0.6, 'rgba(255,210,90,.35)'); g.addColorStop(1, 'rgba(255,210,90,0)');
  x.fillStyle = g; x.fillRect(0, 0, S, S);
  // 袍身（紅金）
  x.beginPath(); x.moveTo(128, 96); x.lineTo(210, 246); x.lineTo(46, 246); x.closePath();
  x.fillStyle = '#c0392b'; x.fill();
  x.strokeStyle = '#f4c430'; x.lineWidth = 7; x.stroke();
  // 領口 / 前襟金飾
  x.beginPath(); x.moveTo(128, 108); x.lineTo(150, 150); x.lineTo(128, 200); x.lineTo(106, 150); x.closePath();
  x.fillStyle = '#f4c430'; x.fill();
  // 雙手合十 + 玉笏
  x.fillStyle = '#f3d3b5'; ellipse(x, 118, 168, 12, 16, '#f3d3b5'); ellipse(x, 138, 168, 12, 16, '#f3d3b5');
  x.fillStyle = '#2e7d5b'; x.fillRect(122, 132, 12, 44);
  // 臉
  ellipse(x, 128, 90, 34, 40, '#f6dcc0');
  // 頭髮
  x.fillStyle = '#241a16'; x.beginPath(); x.arc(128, 74, 40, Math.PI, 0); x.fill();
  // 鳳冠（金）
  x.fillStyle = '#f4c430'; x.fillRect(92, 44, 72, 20);
  x.beginPath(); x.moveTo(92, 44); x.lineTo(128, 26); x.lineTo(164, 44); x.closePath(); x.fill();
  x.beginPath(); x.arc(128, 30, 7, 0, 7); x.fillStyle = '#e5352b'; x.fill();
  // 冕旒珠簾（垂在額前）
  for (let i = -2; i <= 2; i++) { const px = 128 + i * 15; x.strokeStyle = '#f4c430'; x.lineWidth = 2; x.beginPath(); x.moveTo(px, 62); x.lineTo(px, 84); x.stroke();
    for (let j = 0; j < 3; j++) { x.beginPath(); x.arc(px, 66 + j * 7, 3, 0, 7); x.fillStyle = j % 2 ? '#e5352b' : '#7ec8e3'; x.fill(); } }

const particles = [];
const TMP = new THREE.Vector3();
function burst3(pos, n, emojis, opt = {}) {
  for (let i = 0; i < n; i++) {
    const s = emojiSprite(pick(emojis), opt.size || 0.7);
    s.position.copy(pos);
    const a = Math.random() * Math.PI * 2, sp = (opt.sp || 4) * (0.4 + Math.random());
    particles.push({ sprite: s, vx: Math.cos(a)*sp, vy: (opt.up||4)+Math.random()*3, vz: Math.sin(a)*sp, life: opt.life||1, max: opt.life||1, grav: opt.grav ?? 9 });
    scene.add(s);
  }
}
function fireworks3() { for (let k = 0; k < 4; k++) setTimeout(() => burst3(TMP.set((Math.random()-0.5)*10, 5+Math.random()*3, -7-Math.random()*8), 12, ['✨','⭐','🎉','🧧'], { up: 5, sp: 5, life: 1.1 }), k * 150); }
function popText(pos, text, color = '#ffe14d') {
  const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: textTex(text, color), transparent: true, depthWrite: false, depthTest: false }));
  s.scale.set(1.7, 0.85, 1); s.position.copy(pos); scene.add(s);
  particles.push({ sprite: s, vx: 0, vy: 1.9, vz: 0, life: 1.1, max: 1.1, grav: -1 });
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.sprite.position.x += p.vx*dt; p.sprite.position.y += p.vy*dt; p.sprite.position.z += p.vz*dt;
    p.vy -= p.grav*dt; p.life -= dt; p.sprite.material.opacity = Math.max(0, p.life / p.max);
    if (p.rot) p.sprite.material.rotation += p.rot * dt;
    if (p.life <= 0) { scene.remove(p.sprite); particles.splice(i, 1); }
  }
}

/* ================== 體感追蹤（MediaPipe Pose） ================== */
const video = document.getElementById('cam');
const pip = document.getElementById('pip');
const pipDot = document.getElementById('pipDot');
let poseLandmarker = null;
let lastVideoTime = -1, lastSeen = 0;
let personX = 0.5, shoulderW = 0, armsUp = false, squatting = false;
let bodyRatioBase = 0;
let tooCloseSince = 0, pauseUntil = 0, wasPaused = false;

async function setupBodyTracking() {
  const loadingText = document.getElementById('loadingText');
  loadingText.textContent = '正在啟動鏡頭…';
  const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
  video.srcObject = stream;
  await new Promise(r => video.onloadedmetadata = r);
  await video.play();
  loadingText.textContent = '正在載入 AI 模型…（第一次會久一點）';
  const { PoseLandmarker, FilesetResolver } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14');
  const vision = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: { modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task', delegate: 'GPU' },
    runningMode: 'VIDEO', numPoses: 1,
  });
  pip.style.display = 'block';
}
function trackFrame() {
  if (!poseLandmarker || video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;
  let result;
  try { result = poseLandmarker.detectForVideo(video, performance.now()); } catch (e) { return; }
  const lm = result.landmarks && result.landmarks[0];
  if (!lm) return;
  const now = performance.now(); lastSeen = now;
  const scx = (lm[11].x + lm[12].x) / 2, scy = (lm[11].y + lm[12].y) / 2;
  personX = 1 - scx;
  shoulderW = Math.abs(lm[11].x - lm[12].x);
  const sw = Math.max(0.05, shoulderW);
  // 雙手高舉
  const wmy = (lm[15].y + lm[16].y) / 2;
  const band = sw * 0.5;
  armsUp = (scy - lm[15].y) > band && (scy - lm[16].y) > band;
  // 蹲下：以「腳踝~肩」的身高（除肩寬正規化）低於站姿基準 → 蹲
  const ankY = (lm[27].y + lm[28].y) / 2;
  const ratio = (ankY - scy) / sw;
  if (ratio > 0.5 && ratio < 12) {
    if (ratio > bodyRatioBase) bodyRatioBase += (ratio - bodyRatioBase) * 0.06;
    else bodyRatioBase += (ratio - bodyRatioBase) * 0.01;
    const thr = squatting ? 0.90 : 0.80;
    squatting = bodyRatioBase > 1 && ratio < bodyRatioBase * thr;
  }
  pipDot.style.left = (personX * 100) + '%';
  pipDot.style.top = (squatting ? 74 : armsUp ? 20 : 50) + '%';
  pipDot.style.background = squatting ? '#a86a3a' : armsUp ? '#ff66cc' : '#00ff88';
}

/* ================== 更新 ================== */
function update(dt) {
  state.t += dt;
  if (squatCooldown > 0) squatCooldown -= dt;

  if (state.mode === 'body') {
    trackFrame();
    state.kidTargetX = clamp((personX - 0.5) * 2 * KID_X_MAX * 1.15, -KID_X_MAX, KID_X_MAX);
    const nowMs = performance.now();
    const lost = poseLandmarker && nowMs - lastSeen > 2500;
    document.getElementById('findPlayer').style.display = (lost && state.phase === 'play') ? 'block' : 'none';
    if (shoulderW > 0.28 && nowMs - lastSeen < 500) { if (!tooCloseSince) tooCloseSince = nowMs; }
    else if (shoulderW < 0.23 || lost) { tooCloseSince = 0; }
    const tooCloseNow = !!tooCloseSince && nowMs - tooCloseSince > 400;
    if (state.phase === 'play') {
      if (tooCloseNow && nowMs >= pauseUntil) { pauseUntil = nowMs + 5000; sfxAlarm(); say('Too close! Step back, please!'); }
      state.paused = nowMs < pauseUntil;
    } else state.paused = false;
    document.getElementById('tooClose').style.display = state.paused ? 'flex' : 'none';
    if (state.paused) { const remain = Math.ceil((pauseUntil - nowMs) / 1000); document.getElementById('pauseCount').textContent = remain > 0 ? remain : ''; }
    if (wasPaused && !state.paused) say("OK! Let's build!");
    wasPaused = state.paused;
  } else {
    if (touchDown) state.kidTargetX = clamp((touchX - 0.5) * 2 * KID_X_MAX, -KID_X_MAX, KID_X_MAX);
  }

  if (state.toastT > 0) { state.toastT -= dt; zoneToast.style.opacity = state.toastT > 0 ? 1 : 0; }
  const prevKidX = state.kidX;
  state.kidX += (state.kidTargetX - state.kidX) * Math.min(1, dt * 6);
  if (state.shake > 0) state.shake = Math.max(0, state.shake - dt * 16);

  if (state.phase === 'play' && !state.paused) {
    if (wreck.active) wreckerTick(dt);
    buildTick(dt);
    maybeFreeSmash(dt);
    updateParade(dt);
    updateCritters(dt);
    updateHelpers(dt);
    updateDayNight(dt);
    updateAmbient(dt);
  }

  document.getElementById('partyFx').classList.toggle('on', state.party > 0);
  smashBtn.style.display = (state.mode === 'touch' && state.phase === 'play') ? 'block' : 'none';

/* ================== HUD ================== */
const hCount = document.getElementById('hCount');
const hBarFill = document.getElementById('hudBarFill'), hBarText = document.getElementById('hudBarText');
const STEP_NAME = { dig: '① 挖地基', pour: '② 倒水泥', flatten: '③ 壓水泥', hoist: '④ 吊建材', install: '⑤ 請神像', celebrate: '🎉 落成慶典' };
const STEP_TIP = {
  dig:      s => s === 'body' ? '🧎 蹲下～挖地基！' : '👆 點畫面挖地基！',
  pour:     s => s === 'body' ? '🙌 雙手高舉～倒水泥！' : '👆 按住畫面倒水泥！',
  flatten:  s => '🚶 左右移動～把水泥壓平！',
  hoist:    s => s === 'body' ? '➡️ 移到發光處放建材（雙手舉高召破壞車💥）' : '➡️ 移到發光處放建材（按💥砸掉重來）',
  install:  s => s === 'body' ? '🛕 神像請到發光處（雙手舉高召破壞車💥）' : '🛕 神像請到發光處（按💥砸掉重來）',
  celebrate:s => s === 'body' ? '🙌 舉手放更多煙火！' : '👆 一直點放更多煙火！',
};
function syncHUD() {
  if (state.phase === 'menu') return;
  hCount.textContent = '🛕 蓋好 ' + state.built;
  hBarFill.style.width = (state.prog * 100) + '%';
  hBarText.textContent = STEP_NAME[state.step] || '';
  stepTip.textContent = state.phase === 'play' && STEP_TIP[state.step] ? STEP_TIP[state.step](state.mode) : '';
}

/* ================== 主迴圈 ================== */
function onResize() { W = window.innerWidth; H = window.innerHeight; renderer.setSize(W, H, false); camera.aspect = W / H; camera.updateProjectionMatrix(); }
window.addEventListener('resize', onResize); onResize();

let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000); lastT = now;
  if (state.phase !== 'menu') update(dt);
  musicTick(now);
  syncVisual(dt); syncHUD();
  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
